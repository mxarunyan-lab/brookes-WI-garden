name: Phase 4.7.1 Acceptance

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-build-live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run full test suite
        run: npm test
      - name: Build production app
        run: npm run build
      - name: Verify live Phase 4.7.1 deployment
        run: node scripts/verifyPhase471Live.mjs
        env:
          APP_URL: https://brookes-garden-compass.onrender.com
          VERIFY_ATTEMPTS: 60
          VERIFY_DELAY_MS: 10000
