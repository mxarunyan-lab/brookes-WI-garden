name: Verify Phase 4.6X.2 Mobile

on:
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  verify-mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm install --no-save playwright
      - run: npx playwright install chromium
      - run: npm run build
      - name: Check Seed Department at mobile widths
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/preview.log 2>&1 &
          sleep 3
          cat > /tmp/mobile.mjs <<'EOF'
          import{chromium}from'playwright';
          const browser=await chromium.launch({headless:true});
          for(const width of [320,375,390,430]){
            const page=await browser.newPage({viewport:{width,height:900}}),errors=[];page.on('pageerror',e=>errors.push(String(e)));
            await page.goto('http://127.0.0.1:4173/',{waitUntil:'networkidle'});
            let seed=page.getByText('Seed Department',{exact:true}).first();
            if(!(await seed.count())){const center=page.getByText('Garden Center',{exact:true}).first();if(await center.count())await center.click();seed=page.getByText('Seed Department',{exact:true}).first()}
            if(await seed.count())await seed.click();
            await page.waitForTimeout(250);
            const result=await page.evaluate(()=>({overflow:document.documentElement.scrollWidth>document.documentElement.clientWidth,save:[...document.querySelectorAll('button')].some(b=>/save packet/i.test(b.textContent||'')&&b.getBoundingClientRect().height>=42),details:[...document.querySelectorAll('details.packet-all-details')].some(d=>d.open)}));
            if(errors.length||result.overflow||!result.save||result.details)throw new Error(JSON.stringify({width,errors,result}));
            await page.close();
          }
          await browser.close();
          EOF
          node /tmp/mobile.mjs
      - name: Publish mobile status
        if: success()
        run: curl -sS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${REPO}/statuses/${SHA}" -d '{"state":"success","context":"mobile/phase-4-6x-2","description":"Seed Packet mobile checks passed"}' >/dev/null
