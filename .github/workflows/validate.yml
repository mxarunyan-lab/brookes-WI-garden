name: Validate Garden App

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out Phase 4.4B branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase-4-4b-weather-decisions
      - name: Apply Phase 4.4B validation fixes
        run: |
          set -o pipefail
          python .github/scripts/fix_phase_4_4b.py 2>&1 | tee patch.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Phase 4.4B weather decision validation"
          git push origin HEAD:agent/phase-4-4b-weather-decisions
      - name: Upload patch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-4-4b-patch-log
          path: patch.log
          retention-days: 2
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run environmental and weather-decision tests
        id: tests
        continue-on-error: true
        run: npm test > test.log 2>&1
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: garden-test-log
          path: test.log
          retention-days: 2
      - name: Stop when tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Build production app
        id: production_build
        continue-on-error: true
        run: npm run build > build.log 2>&1
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-build-log
          path: build.log
          retention-days: 2
      - name: Upload compiled app
        if: steps.production_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: compiled-garden-app
          path: dist
          retention-days: 2
      - name: Fail when production build failed
        if: steps.production_build.outcome == 'failure'
        run: exit 1
