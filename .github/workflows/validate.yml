name: Validate Garden App

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run environmental, weather, and seed-packet tests
        id: tests
        continue-on-error: true
        run: npm test > test.log 2>&1
      - name: Update diagnostic comment with failing test tail
        if: steps.tests.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tail -n 120 test.log > test-tail.log
          body=$(cat test-tail.log)
          gh api --method PATCH repos/mxarunyan-lab/brookes-WI-garden/issues/comments/5062236369 -f body="$body"
      - name: Stop when tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Build production app
        id: production_build
        continue-on-error: true
        run: npm run build > build.log 2>&1
      - name: Fail when production build failed
        if: steps.production_build.outcome == 'failure'
        run: exit 1
