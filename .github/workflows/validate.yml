name: Validate Garden App

on:
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run environmental, weather, and seed-packet tests
        id: tests
        continue-on-error: true
        run: npm test > test.log 2>&1
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: garden-test-log
          path: test.log
          retention-days: 2
      - name: Stop when tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Build production app
        id: production_build
        continue-on-error: true
        run: npm run build > build.log 2>&1
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-build-log
          path: build.log
          retention-days: 2
      - name: Upload compiled app
        if: steps.production_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: compiled-garden-app
          path: dist
          retention-days: 2
      - name: Fail when production build failed
        if: steps.production_build.outcome == 'failure'
        run: exit 1

  verify-render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      SHA: ${{ github.sha }}
    steps:
      - name: Poll deployed Phase 4.6 build
        run: |
          set -euo pipefail
          url='https://brookes-wi-garden.onrender.com/'
          status_api="https://api.github.com/repos/${REPO}/statuses/${SHA}"
          publish_status() {
            curl -sS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "$status_api" -d "{\"state\":\"$1\",\"context\":\"render/phase-4-6\",\"description\":\"$2\"}" >/dev/null
          }
          publish_status pending 'Waiting for Render v0.19.0'
          for attempt in $(seq 1 48); do
            http_status=$(curl -L -sS -o live-index.html -w '%{http_code}' --max-time 45 "$url" || true)
            if [ "$http_status" = '200' ]; then
              asset=$(grep -oE 'src="[^"]+\.js"' live-index.html | head -n1 | cut -d'"' -f2 || true)
              if [ -n "$asset" ]; then
                case "$asset" in
                  http*) asset_url="$asset" ;;
                  /*) asset_url="${url%/}${asset}" ;;
                  *) asset_url="${url}${asset}" ;;
                esac
                curl -L -sS --max-time 90 "$asset_url" -o live-app.js || true
                if grep -q 'phase-4-6-intelligence-reality-check' live-app.js && grep -q '0.19.0' live-app.js; then
                  publish_status success 'Render serves Phase 4.6 v0.19.0'
                  exit 0
                fi
              fi
            fi
            sleep 15
          done
          publish_status failure 'Render v0.19.0 not verified'
          exit 1
