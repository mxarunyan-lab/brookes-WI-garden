name: Validate Garden App

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: phase-4-8-2-weather-truth
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run environmental, weather, and seed-packet tests
        id: tests
        continue-on-error: true
        run: npm test > test.log 2>&1
      - name: Capture Phase 4.8.2 test output
        if: always()
        run: |
          cp test.log phase482-test.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add phase482-test.log
          git commit -m "Capture Phase 4.8.2 failing test output" || true
          git push origin HEAD:phase-4-8-2-weather-truth
      - name: Stop when tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Build production app
        id: production_build
        continue-on-error: true
        run: npm run build > build.log 2>&1
      - name: Fail when production build failed
        if: steps.production_build.outcome == 'failure'
        run: exit 1
