name: Validate Garden App

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Build unminified app
        run: npx vite build --minify=false --sourcemap
      - name: Upload unminified app
        uses: actions/upload-artifact@v4
        with:
          name: unminified-garden-app
          path: dist
          retention-days: 1
