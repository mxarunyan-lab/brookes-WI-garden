name: Validate Garden App

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-visual-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install app dependencies
        run: npm install
      - name: Install temporary Playwright runner
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Build production app
        run: npm run build
      - name: Start compiled app
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          for attempt in {1..40}; do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then exit 0; fi
            sleep 1
          done
          cat preview.log
          exit 1
      - name: Exclude controls inside closed accordions
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('scripts/phase43-visual-check.mjs')
          s=p.read_text()
          old="return style.display!=='none'&&style.visibility!=='hidden'&&rect.width>0&&rect.height>0;"
          new="return !el.closest('details:not([open])')&&style.display!=='none'&&style.visibility!=='hidden'&&rect.width>0&&rect.height>0;"
          if old not in s: raise SystemExit('clearance filter not found')
          p.write_text(s.replace(old,new,1))
          PY
      - name: Run 320–430px route and visual checks
        env:
          BASE_URL: http://127.0.0.1:4173
        run: node scripts/phase43-visual-check.mjs
      - name: Upload Phase 4.3 screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-4-3-mobile-validation
          path: |
            phase43-artifacts
            preview.log
          retention-days: 2
