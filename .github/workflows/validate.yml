name: Validate Garden App

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run complete test suite
        id: tests
        continue-on-error: true
        run: npm test > test.log 2>&1
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: garden-test-log
          path: test.log
          retention-days: 2
      - name: Report test failure details
        if: steps.tests.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node <<'NODE'
          const fs=require('fs');
          const {execFileSync}=require('child_process');
          const text=fs.readFileSync('test.log','utf8');
          const blocks=[...text.matchAll(/^not ok .*?(?=^# Subtest:|^1\.\.|\Z)/gms)].map(match=>match[0].trim());
          blocks.forEach((block,index)=>{
            const body=`### Validation failure ${index+1} of ${blocks.length}\n\n\`\`\`text\n${block.slice(0,7500)}\n\`\`\``;
            const file=`validation-failure-${index+1}.md`;
            fs.writeFileSync(file,body);
            execFileSync('gh',['pr','comment',process.env.PR_NUMBER,'--body-file',file],{stdio:'inherit'});
          });
          NODE
      - name: Stop when tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Build production app
        id: production_build
        continue-on-error: true
        run: npm run build > build.log 2>&1
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-build-log
          path: build.log
          retention-days: 2
      - name: Report build failure summary
        if: steps.production_build.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Production build failure'
            echo '```text'
            tail -n 160 build.log
            echo '```'
          } > validation-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file validation-comment.md
      - name: Upload compiled app
        if: steps.production_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: compiled-garden-app
          path: dist
          retention-days: 2
      - name: Fail when production build failed
        if: steps.production_build.outcome == 'failure'
        run: exit 1
