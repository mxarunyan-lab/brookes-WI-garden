name: Validate Garden App

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out Phase 4.5 branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase-4-5-stabilization
      - name: Fix singular packet dimensions
        run: python .github/scripts/fix_phase_4_5_dimensions.py
      - name: Commit source fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/seedPacketIntelligence.js test/seedPacketIntelligence.test.js
          git commit -m "Preserve packet dimension units"
          git push origin HEAD:agent/phase-4-5-stabilization
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run full tests
        id: tests
        continue-on-error: true
        run: npm test > test.log 2>&1
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-4-5-test-log
          path: test.log
          retention-days: 2
      - name: Stop when tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Build production app
        id: production_build
        continue-on-error: true
        run: npm run build > build.log 2>&1
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-4-5-build-log
          path: build.log
          retention-days: 2
      - name: Upload compiled app
        if: steps.production_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: phase-4-5-compiled-app
          path: dist
          retention-days: 2
      - name: Fail when production build failed
        if: steps.production_build.outcome == 'failure'
        run: exit 1
