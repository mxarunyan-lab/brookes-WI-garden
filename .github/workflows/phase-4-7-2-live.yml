name: Phase 4.7.2 Live Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Wait for and verify Render deployment
        run: node scripts/verifyPhase472Live.mjs
        env:
          APP_URL: https://brookes-garden-compass.onrender.com
          VERIFY_ATTEMPTS: 60
          VERIFY_DELAY_MS: 10000
