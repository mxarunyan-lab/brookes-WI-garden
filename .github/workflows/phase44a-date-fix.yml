name: Apply Phase 4.4A date regression fix

on:
  push:
    branches: [agent/phase-4-4a-weather-intelligence]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-4-4a-weather-intelligence
      - name: Patch planting date handling and regression test
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('src/plantingDesk.js')
          text = source.read_text()
          text = text.replace("import { formatGardenDateRange } from './dateFormat.js';", "import { formatGardenDateRange, localDateInputValue } from './dateFormat.js';")
          text = text.replace("const dateKey=value=>String(value||todayKey()).slice(0,10);", "export const plantingDateKey=value=>value instanceof Date?localDateInputValue(value):String(value||todayKey()).slice(0,10);\nconst dateKey=plantingDateKey;")
          source.write_text(text)

          test_file = Path('test/plantingDesk.test.js')
          test_text = test_file.read_text()
          test_text = test_text.replace("import{buildGrowNowRecommendations,groupPlantingRecommendations,seedInventory}from'../src/plantingDesk.js';", "import{buildGrowNowRecommendations,groupPlantingRecommendations,plantingDateKey,seedInventory}from'../src/plantingDesk.js';")
          marker = "const calmWeather={signals:{poorPlantingWindow:{status:false,reason:'No major conflict.'}},high:78,low:58};\n"
          regression = "\ntest('Date objects keep a sortable local YYYY-MM-DD planting key',()=>{assert.equal(plantingDateKey(new Date('2026-07-17T12:00:00-05:00')),'2026-07-17')});\n"
          if regression.strip() not in test_text:
              test_text = test_text.replace(marker, marker + regression)
          test_file.write_text(test_text)
          PY
      - name: Commit fix
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/plantingDesk.js test/plantingDesk.test.js
          git commit -m "Fix Planting Desk date comparisons"
          git push origin HEAD:agent/phase-4-4a-weather-intelligence
