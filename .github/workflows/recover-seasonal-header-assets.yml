name: Recover Seasonal Header Assets

on:
  pull_request:
    branches: [main]
    types: [ready_for_review]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: recover-seasonal-header-assets
  cancel-in-progress: true

jobs:
  recover-assets:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/seasonal-mobile-garden-header
          fetch-depth: 0

      - name: Fetch every remote branch
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*' --force --prune

      - name: Inventory historical seasonal assets
        shell: bash
        run: |
          set -euo pipefail
          report='.asset-staging/seasonal-images/recovery-report.txt'
          mkdir -p "$(dirname "$report")"
          : > "$report"
          echo 'Seasonal asset recovery inventory' >> "$report"
          echo "Generated from ${GITHUB_SHA}" >> "$report"
          echo >> "$report"

          for season in spring summer fall winter; do
            echo "[$season]" >> "$report"
            found=0
            while read -r commit; do
              mapfile -t chunks < <(
                git ls-tree -r --name-only "$commit" |
                  grep -E "^\.asset-staging/seasonal-images/${season}-[0-9]+\.b64$" |
                  sort || true
              )
              if [[ "${#chunks[@]}" -gt 0 ]]; then
                found=1
                echo "commit=$commit" >> "$report"
                echo "refs=$(git branch -r --contains "$commit" | sed 's/^[[:space:]]*//' | paste -sd ',' -)" >> "$report"
                printf 'chunks=%s\n' "${chunks[*]}" >> "$report"
                break
              fi
            done < <(git rev-list --all --date-order)
            if [[ "$found" -eq 0 ]]; then
              echo 'missing=true' >> "$report"
            fi
            echo >> "$report"
          done

          echo '[all historical staging paths]' >> "$report"
          for commit in $(git rev-list --all --date-order); do
            git ls-tree -r --name-only "$commit" | grep '^\.asset-staging/seasonal-images/' || true
          done | sort -u >> "$report"
          cat "$report"

      - name: Commit recovery inventory
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .asset-staging/seasonal-images/recovery-report.txt
          git commit -m 'Record seasonal asset recovery inventory'
          git push origin HEAD:agent/seasonal-mobile-garden-header
