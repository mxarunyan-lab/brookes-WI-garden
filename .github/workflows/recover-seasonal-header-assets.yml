name: Recover Seasonal Header Assets

on:
  pull_request:
    branches: [main]
    types: [ready_for_review]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: recover-seasonal-header-assets
  cancel-in-progress: true

jobs:
  recover-assets:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/seasonal-mobile-garden-header
          fetch-depth: 0

      - name: Restore the surviving approved spring asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public/images/garden-headers
          tr -d '\r\n\t ' < .asset-staging/seasonal-images/spring-00.b64 | base64 --decode > public/images/garden-headers/spring.avif
          test -s public/images/garden-headers/spring.avif
          file public/images/garden-headers/spring.avif

      - name: Commit recovered spring asset
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/images/garden-headers/spring.avif
          if git diff --cached --quiet; then
            echo 'Spring asset is already restored.'
            exit 0
          fi
          git commit -m 'Restore approved spring garden header asset'
          git pull --rebase origin agent/seasonal-mobile-garden-header
          git push origin HEAD:agent/seasonal-mobile-garden-header
