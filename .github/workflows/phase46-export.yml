name: Phase 4.6 Source Export

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
      - name: Package repository source
        run: tar --exclude=.git --exclude=repo-source.tar.gz -czf repo-source.tar.gz .
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: phase-4-6-source-snapshot
          path: repo-source.tar.gz
          retention-days: 2
