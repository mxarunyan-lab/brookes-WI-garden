name: Finalize Seasonal Header Assets

on:
  push:
    branches: [agent/phase-4-7-6-seasonal-header-clean]

permissions:
  contents: write

concurrency:
  group: finalize-seasonal-header-assets
  cancel-in-progress: true

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-4-7-6-seasonal-header-clean
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Decode and validate the four approved AVIF headers
        run: node scripts/finalizeSeasonalHeaderAssets.mjs
      - name: Commit the real assets and remove transfer sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize approved seasonal garden header assets"
          git push origin HEAD:agent/phase-4-7-6-seasonal-header-clean
