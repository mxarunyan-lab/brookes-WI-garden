name: Finalize Phase 4.8.2 Weather Truth
on:
  push:
    branches: [phase-4-8-2-weather-truth]
    paths:
      - .github/workflows/phase482-finalize.yml
      - scripts/finalizePhase482.py
  workflow_dispatch:
permissions:
  contents: write
jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-4-8-2-weather-truth
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply Phase 4.8.2 source corrections
        run: python scripts/finalizePhase482.py
      - name: Commit completed source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Complete Phase 4.8.2 weather truth and station integration"
          git push origin HEAD:phase-4-8-2-weather-truth
      - run: npm ci
      - run: npm test
      - run: npm run build
