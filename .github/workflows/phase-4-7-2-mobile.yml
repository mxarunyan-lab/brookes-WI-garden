name: Phase 4.7.5 Mobile Acceptance

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-phase-475-mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Build production app
        run: npm run build
      - name: Start production server
        run: |
          PORT=4173 npm start > phase475-mobile-server.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/api/health >/dev/null; then exit 0; fi
            sleep 1
          done
          cat phase475-mobile-server.log
          exit 1
      - name: Verify photographed workflows at mobile widths
        shell: bash
        run: |
          mkdir -p phase472-mobile
          set -o pipefail
          node scripts/verifyPhase472Mobile.mjs 2>&1 | tee phase472-mobile/run.log
        env:
          APP_URL: http://127.0.0.1:4173
      - name: Upload mobile screenshots and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-4-7-5-mobile-acceptance
          path: |
            phase472-mobile
            phase475-mobile-server.log
          if-no-files-found: warn
          retention-days: 3
