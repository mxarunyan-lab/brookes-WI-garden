name: Phase 4.6X.1 Source Export

on:
  push:
    branches: [agent/phase-4-6x-1-seed-trust-speed]

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: tar --exclude=.git -czf /tmp/phase46x1-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: phase-4-6x-1-source
          path: /tmp/phase46x1-source.tar.gz
          retention-days: 2
