name: Phase 4.7.4 Planting Desk Readability

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-iceberg-recommendation:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build production application
        run: npm run build
      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Start production server
        run: |
          PORT=4173 npm start > phase474-planting-desk-server.log 2>&1 &
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:4173/api/health >/dev/null; then exit 0; fi
            sleep 1
          done
          cat phase474-planting-desk-server.log
          exit 1
      - name: Verify Iceberg recommendation card readability
        run: node scripts/verifyPhase474PlantingDeskReadability.mjs
        env:
          APP_URL: http://127.0.0.1:4173
      - name: Verify Planting Desk heading and drawer readability
        run: node scripts/verifyPhase474PlantingDeskTypography.mjs
        env:
          APP_URL: http://127.0.0.1:4173
      - name: Upload Planting Desk evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-4-7-4-planting-desk-evidence
          path: |
            phase474-audit/planting-desk
            phase474-audit/planting-desk-typography
            phase474-planting-desk-server.log
          if-no-files-found: warn
          retention-days: 7
