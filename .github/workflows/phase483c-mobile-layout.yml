name: Phase 4.8.3c Mobile Checklist Layout

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-layout:
    if: github.head_ref == 'phase-4-8-3c-checklist-layout-hotfix'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Install browser test runtime
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Start production service
        run: |
          npm start > /tmp/garden-server.log 2>&1 &
          for i in $(seq 1 30); do curl -fsS http://127.0.0.1:3000/api/health && exit 0; sleep 1; done
          cat /tmp/garden-server.log
          exit 1
      - name: Verify checklist at mobile widths
        run: node scripts/verifyPhase483cLayout.mjs