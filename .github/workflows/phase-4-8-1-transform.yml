name: Phase 4.8.1 Transform
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/phase-4-8-1-transform.yml
  workflow_dispatch:
permissions:
  contents: write
jobs:
  transform:
    if: github.head_ref == 'phase-4-8-1-mobile-continuity'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-4-8-1-mobile-continuity
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Align backend test release version
        run: |
          python - <<'PY'
          from pathlib import Path
          path=Path('test/seedPacketBackend.test.js')
          text=path.read_text().replace("health.version,'0.20.5'","health.version,'0.20.9'")
          path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test/seedPacketBackend.test.js
          git commit -m "Align Phase 4.8.1 backend health test" || true
          git push origin HEAD:phase-4-8-1-mobile-continuity
      - run: npm ci
      - run: npm test
      - run: npm run build
# final release verification trigger
