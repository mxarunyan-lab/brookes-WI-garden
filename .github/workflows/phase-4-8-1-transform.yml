name: Phase 4.8.1 Transform
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/phase-4-8-1-transform.yml
  workflow_dispatch:
permissions:
  contents: write
jobs:
  transform:
    if: github.head_ref == 'phase-4-8-1-mobile-continuity'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-4-8-1-mobile-continuity
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Align server and backend test release version
        run: |
          python - <<'PY'
          from pathlib import Path
          for path in [Path('server/index.js'),Path('test/seedPacketBackend.test.js')]:
              text=path.read_text()
              text=text.replace("process.env.APP_VERSION || '0.20.7'","process.env.APP_VERSION || '0.20.9'")
              text=text.replace("health.version,'0.20.5'","health.version,'0.20.9'")
              path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/index.js test/seedPacketBackend.test.js
          git commit -m "Align Phase 4.8.1 server health version" || true
          git push origin HEAD:phase-4-8-1-mobile-continuity
      - run: npm ci
      - run: npm test
      - run: npm run build
