name: Phase 4.8.1 Transform
on:
  pull_request:
    branches: [main]
    paths:
      - scripts/applyPhase481.mjs
      - .github/workflows/phase-4-8-1-transform.yml
  workflow_dispatch:
permissions:
  contents: write
jobs:
  transform:
    if: github.head_ref == 'phase-4-8-1-mobile-continuity'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-4-8-1-mobile-continuity
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture focused test and build diagnostics
        run: |
          set +e
          npm test > /tmp/phase481-test.log 2>&1
          TEST_STATUS=$?
          npm run build > /tmp/phase481-build.log 2>&1
          BUILD_STATUS=$?
          {
            echo "TEST_STATUS=$TEST_STATUS"
            echo "BUILD_STATUS=$BUILD_STATUS"
            echo "--- FAILED TEST DETAILS ---"
            grep -nE "not ok|AssertionError|ERR_ASSERTION|failureType|expected:|actual:|Error:" /tmp/phase481-test.log || true
            echo "--- TEST SUMMARY ---"
            tail -n 30 /tmp/phase481-test.log
            echo "--- BUILD SUMMARY ---"
            tail -n 40 /tmp/phase481-build.log
          } > phase481-diagnostics.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add phase481-diagnostics.txt
          git commit -m "Refresh Phase 4.8.1 verification diagnostics" || true
          git push origin HEAD:phase-4-8-1-mobile-continuity
          exit 0
