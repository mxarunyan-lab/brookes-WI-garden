name: Phase 4.7.4 Seed Packet Intelligence

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-smart-packet-workflow:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply guarded packet corrections in test workspace
        run: node scripts/applyPhase474SeedPacketIntelligenceFix.mjs
      - name: Check transformed source syntax
        run: |
          node --check server/index.js
          node --check server/productResearch.js
          node --check server/seedPacketVision.js
          node --check src/seedPacketIntelligence.js
          node --check src/seedProductLookup.js
          node --check scripts/verifyPhase474SeedPacketIntelligence.mjs
          git diff --check
      - name: Run full test suite
        run: npm test
      - name: Build production application
        run: npm run build
      - name: Verify Sow Right and all-brand packet behavior
        run: node scripts/verifyPhase474SeedPacketIntelligence.mjs
