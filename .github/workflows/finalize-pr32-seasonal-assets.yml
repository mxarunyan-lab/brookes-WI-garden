name: Finalize PR 32 Seasonal Assets

on:
  pull_request_target:
    types: [ready_for_review]

permissions:
  contents: write

concurrency:
  group: finalize-pr32-seasonal-assets
  cancel-in-progress: true

jobs:
  finalize:
    if: github.event.pull_request.number == 32 && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/seasonal-mobile-garden-header'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/seasonal-mobile-garden-header
          fetch-depth: 0

      - name: Decode and verify approved seasonal headers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public/images/garden-headers

          tr -d '\r\n\t ' < .asset-staging/spring.avif.b64 | base64 --decode > public/images/garden-headers/spring.avif
          tr -d '\r\n\t ' < .asset-staging/fall.avif.b64 | base64 --decode > public/images/garden-headers/fall.avif
          cat .asset-staging/summer.avif.b64.part* | tr -d '\r\n\t ' | base64 --decode > public/images/garden-headers/summer.avif
          cat .asset-staging/winter.avif.b64.part* | tr -d '\r\n\t ' | base64 --decode > public/images/garden-headers/winter.avif

          cat > /tmp/seasonal.sha256 <<'SUMS'
          77ada230e515b7332eafd9330a66c56b90d621dd465c37f893852f09cfe6b905  public/images/garden-headers/spring.avif
          29144a56500a85ce9a7161660dc8fb453fe779615610dfefb0359e1467add96b  public/images/garden-headers/summer.avif
          83c555a1483fbf9fdf9e7f33dbf5ee4a1ca09fe278c7c628628d34fe6659a181  public/images/garden-headers/fall.avif
          90194a0c2fa691dc74a916c401804371e0ad6914fb0120eec7f54246a4d5b46e  public/images/garden-headers/winter.avif
          SUMS
          sha256sum --check /tmp/seasonal.sha256

          for asset in public/images/garden-headers/*.avif; do
            test -s "$asset"
            file "$asset"
          done

      - name: Commit production assets and remove branch-only transfer scaffolding
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/images/garden-headers/*.avif
          git rm -r .asset-staging
          git rm .github/workflows/finalize-seasonal-header-assets.yml
          git commit -m 'Add approved seasonal garden header assets'
          git pull --rebase origin agent/seasonal-mobile-garden-header
          git push origin HEAD:agent/seasonal-mobile-garden-header
