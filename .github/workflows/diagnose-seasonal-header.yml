name: Diagnose Seasonal Header

on:
  push:
    branches: [agent/diagnose-seasonal-header]

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm install --no-save playwright
      - run: npx playwright install --with-deps chromium
      - name: Inspect production computed header styles
        run: node scripts/diagnoseSeasonalHeaderLive.mjs | tee seasonal-header-diagnosis.log
      - name: Publish diagnostic status
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          description=$(tail -n 1 seasonal-header-diagnosis.log | cut -c1-140)
          payload=$(DESC="$description" python -c 'import json,os;print(json.dumps({"state":"success","context":"diagnose/seasonal-header","description":os.environ["DESC"],"target_url":os.environ["RUN_URL"]}))')
          curl --fail-with-body -sS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${REPO}/statuses/${SHA}" -d "$payload"
