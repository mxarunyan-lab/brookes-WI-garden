name: Phase 4.6X Source Export

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export-source:
    if: github.event.pull_request.head.ref == 'agent/phase-4-6x-pre-sync-readiness'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out Phase 4.6X branch
        uses: actions/checkout@v4
      - name: Package repository source
        run: tar --exclude=.git -czf /tmp/phase46x-source.tar.gz .
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: phase-4-6x-source-snapshot
          path: /tmp/phase46x-source.tar.gz
          retention-days: 2
