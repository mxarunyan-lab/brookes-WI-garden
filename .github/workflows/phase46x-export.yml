name: Phase 4.6X Source Export

on:
  push:
    branches: [agent/phase-4-6x-pre-sync-readiness]

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out Phase 4.6X branch
        uses: actions/checkout@v4
      - name: Package repository source
        run: tar --exclude=.git -czf /tmp/phase46x-source.tar.gz .
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: phase-4-6x-source-snapshot
          path: /tmp/phase46x-source.tar.gz
          retention-days: 2
