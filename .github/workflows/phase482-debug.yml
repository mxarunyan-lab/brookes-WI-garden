name: Phase 4.8.2 Debug Validation
on:
  push:
    branches: [phase-4-8-2-weather-truth]
    paths: [.github/workflows/phase482-debug.yml]
permissions:
  contents: write
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-4-8-2-weather-truth
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture test result
        shell: bash
        run: |
          set +e
          npm test > phase482-debug.log 2>&1
          echo "EXIT_CODE=$?" >> phase482-debug.log
          git config user.name garden-compass-agent
          git config user.email garden-compass-agent@users.noreply.github.com
          git add phase482-debug.log
          git commit -m "Capture Phase 4.8.2 validation output" || true
          git push origin HEAD:phase-4-8-2-weather-truth
