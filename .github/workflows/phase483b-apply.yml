name: Apply Phase 4.8.3b Garden History Patch

on:
  push:
    branches: [phase-4-8-3b-restore-garden-history]
    paths: [.github/workflows/phase483b-apply.yml]

permissions:
  contents: write

jobs:
  apply-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-4-8-3b-restore-garden-history
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply focused correction
        run: |
          echo "Patch workflow trigger reached."
          exit 1
