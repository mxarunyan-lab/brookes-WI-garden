name: Apply Phase 4.8.3b Garden History Patch

on:
  push:
    branches: [phase-4-8-3b-restore-garden-history]
    paths: [.github/workflows/phase483b-apply.yml]

permissions:
  contents: write

jobs:
  apply-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-4-8-3b-restore-garden-history
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply focused correction
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              p=Path(path); text=p.read_text()
              if old not in text:
                  raise SystemExit(f'missing expected text in {path}: {old[:160]}')
              p.write_text(text.replace(old,new,1))

          Path('src/setupOnboarding.js').write_text("""export function activeGrowingSpaces(garden={}){return(garden.spaces||[]).filter(space=>!space.hidden&&!space.deletedAt)}
export function connectedActivePlants(garden={}){const ids=new Set(activeGrowingSpaces(garden).map(space=>space.id));return(garden.plants||[]).filter(plant=>!plant.archived&&!plant.deletedAt&&ids.has(plant.spaceId))}
export function gardenSetupInventory(garden={}){const spaces=activeGrowingSpaces(garden),plants=connectedActivePlants(garden);return{spaces,plants,hasSpace:spaces.length>0,hasConnectedPlant:plants.length>0}}
export function mergeSetupProfile(profile={},patch={},now=new Date().toISOString()){const next={...profile,...patch};if(next.setupDetailsConfirmedAt&&next.setupGardenConfirmedAt&&!next.setupCompletedAt)next.setupCompletedAt=now;return next}
export function beginGardenSetupReview(profile={},garden={},now=new Date().toISOString()){if(profile.setupGardenConfirmedAt)return profile;const inventory=gardenSetupInventory(garden);return mergeSetupProfile(profile,{setupGardenStartedAt:profile.setupGardenStartedAt||now,setupGardenNeedsExplicitReview:Boolean(inventory.hasConnectedPlant)},now)}
export function confirmGardenSetup(profile={},now=new Date().toISOString()){return mergeSetupProfile(profile,{setupGardenConfirmedAt:profile.setupGardenConfirmedAt||now},now)}
export function completeFreshGardenSetup(profile={},garden={},now=new Date().toISOString()){if(profile.setupGardenConfirmedAt||!profile.setupGardenStartedAt||profile.setupGardenNeedsExplicitReview)return profile;const inventory=gardenSetupInventory(garden);return inventory.hasSpace&&inventory.hasConnectedPlant?confirmGardenSetup(profile,now):profile}
export function setupChecklistState(profile={},garden={}){const inventory=gardenSetupInventory(garden),detailsConfirmed=Boolean(profile.setupDetailsConfirmedAt),gardenConfirmed=Boolean(profile.setupGardenConfirmedAt),complete=Boolean(detailsConfirmed&&gardenConfirmed);return{...inventory,detailsConfirmed,gardenConfirmed,complete,gardenItemTitle:inventory.hasConnectedPlant?'Review Growing Spaces & Plants':'Add a Growing Space & Plants',gardenItemDescription:inventory.hasConnectedPlant?'Your garden already contains Growing Spaces and plantings. Review them and confirm that everything looks right.':inventory.hasSpace?'Your Growing Space is ready. Add the first plant growing there.':'Set up a bed, container, grow bag, greenhouse area, tray, or indoor setup, then add what is growing there.',gardenItemAction:inventory.hasConnectedPlant?'Review Garden':'Open Garden'}}
""")

          replace('src/UrgentHome.jsx',"import{formatUrgentBadge}from'./urgentGardenAlerts.js';", "import{formatUrgentBadge}from'./urgentGardenAlerts.js';\nimport{setupChecklistState}from'./setupOnboarding.js';")
          replace('src/UrgentHome.jsx',"function SetupStep({number,label,text,complete,active,action,onClick}){return <li className={`${complete?'is-complete':''} ${active?'is-next':''}`}><span className=\"setup-step-marker\" aria-label={complete?'Complete':`Step ${number}`}>{complete?<Check/>:number}</span><div><small>STEP {number}</small><strong>{label}</strong><p>{text}</p>{active&&<button type=\"button\" onClick={onClick}>{action}<ChevronRight/></button>}</div></li>}\nexport function SimplifiedTodayCard({profile,garden,urgentAlerts=[],setupTask,onTask,navigate,onOpenAlerts}){const detailsComplete=Boolean(String(profile?.gardenName||'').trim()&&String(profile?.location||'').trim()),spaces=(garden.spaces||[]).filter(space=>!space.hidden&&!space.deletedAt),plants=(garden.plants||[]).filter(plant=>!plant.archived&&!plant.deletedAt),setupComplete=detailsComplete&&spaces.length>0&&plants.length>0,primary=urgentAlerts[0],openSpaceSetup=()=>{try{sessionStorage.setItem('garden-open-add-space','1')}catch{}navigate('garden')};if(!setupComplete){const next=!detailsComplete?1:!spaces.length?2:3;return <section className=\"what-matters-today today-summary-card is-onboarding setup-progress-card\" aria-labelledby=\"what-matters-today-title\"><div className=\"today-summary-copy\"><small>TODAY</small><h2 id=\"what-matters-today-title\">Let’s set up your garden</h2><p>Garden Compass works best after it knows your garden, where things are growing, and what is planted.</p></div><ol className=\"garden-setup-steps\"><SetupStep number={1} label=\"Confirm garden details\" text=\"Garden name, gardener, location, and frost dates.\" complete={detailsComplete} active={next===1} action=\"Review Details\" onClick={()=>navigate('admin-profile')}/><SetupStep number={2} label=\"Add a Growing Space\" text=\"A bed, container, grow bag, greenhouse area, tray, or indoor setup.\" complete={spaces.length>0} active={next===2} action=\"Add Growing Space\" onClick={openSpaceSetup}/><SetupStep number={3} label=\"Add what is growing\" text=\"Connect the first planting to one of the saved Growing Spaces.\" complete={plants.length>0} active={next===3} action=\"Add Planting\" onClick={()=>setupTask?onTask(setupTask):navigate('plan-plant')}/></ol></section>}if(primary)", "function SetupItem({title,text,action,current,onClick}){return <li className={current?'is-next':''}><button type=\"button\" onClick={onClick} aria-current={current?'step':undefined} aria-label={`${title}. ${text} ${action}`}><span className=\"setup-step-marker\" aria-label=\"Not complete\"><Check/></span><span><strong>{title}</strong><p>{text}</p><em>{action}</em></span><ChevronRight/></button></li>}\nexport function SimplifiedTodayCard({profile,garden,urgentAlerts=[],navigate,onOpenAlerts,onBeginGardenSetup}){const setup=setupChecklistState(profile,garden),primary=urgentAlerts[0];if(!setup.complete){return <section className=\"what-matters-today today-summary-card is-onboarding setup-progress-card\" aria-labelledby=\"what-matters-today-title\"><div className=\"today-summary-copy\"><small>TODAY</small><h2 id=\"what-matters-today-title\">Let’s set up your garden</h2><p>Complete these basics so Garden Compass knows what belongs in your garden.</p></div><ul className=\"garden-setup-steps\">{!setup.detailsConfirmed&&<SetupItem title=\"Confirm Garden Details\" text=\"Review the garden name, gardener, Green Bay location, and frost dates.\" action=\"Review Details\" current onClick={()=>navigate('admin-profile')}/>} {!setup.gardenConfirmed&&<SetupItem title={setup.gardenItemTitle} text={setup.gardenItemDescription} action={setup.gardenItemAction} current={setup.detailsConfirmed} onClick={()=>{onBeginGardenSetup?.();navigate('garden')}}/>}</ul></section>}if(primary)")

          replace('src/WorkspaceScreens.jsx',"export function TodayWorkspace({profile,garden,tasks,dailyDone,noticeOpen,setNoticeOpen,weatherState,weatherAlert,weatherGuidance,activity,navigate,onTask,tomorrowTasks=[]})", "export function TodayWorkspace({profile,garden,tasks,dailyDone,noticeOpen,setNoticeOpen,weatherState,weatherAlert,weatherGuidance,activity,navigate,onTask,onBeginGardenSetup,tomorrowTasks=[]})")
          replace('src/WorkspaceScreens.jsx',"<SimplifiedTodayCard profile={profile} garden={garden} urgentAlerts={urgentAlerts} setupTask={setupTask} onTask={onTask} navigate={navigate} onOpenAlerts={()=>setNoticeOpen(true)}/>", "<SimplifiedTodayCard profile={profile} garden={garden} urgentAlerts={urgentAlerts} navigate={navigate} onOpenAlerts={()=>setNoticeOpen(true)} onBeginGardenSetup={onBeginGardenSetup}/>")

          replace('src/AdminScreens.jsx',"function ProfileScreen({garden,onUpdateProfile})", "const confirmDetails=(profile,patch)=>({...patch,setupDetailsConfirmedAt:profile?.setupDetailsConfirmedAt||new Date().toISOString()});\nfunction ProfileScreen({garden,onUpdateProfile})")
          replace('src/AdminScreens.jsx',"onUpdateProfile({gardenName:name.trim()||'The Runyan Garden'})", "onUpdateProfile(confirmDetails(garden.profile,{gardenName:name.trim()||'The Runyan Garden'}))")
          replace('src/AdminScreens.jsx',"onUpdateProfile(draft)", "onUpdateProfile(confirmDetails(garden.profile,draft))")

          replace('src/BedWorkspace.jsx',"import{ArrowDown,ArrowLeft,ArrowUp,Camera,ChevronRight,Copy,ExternalLink,Eye,EyeOff,ImageOff,Leaf,Pencil,Plus,QrCode,ScanLine,Sprout,Trash2,X}from'lucide-react';", "import{ArrowDown,ArrowLeft,ArrowUp,BookOpen,Camera,ChevronRight,Copy,ExternalLink,Eye,EyeOff,ImageOff,Leaf,Pencil,Plus,QrCode,ScanLine,Sprout,Trash2,X}from'lucide-react';")
          replace('src/BedWorkspace.jsx',"import{cleanGrowingSpaceForType,SOIL_SPACE_TYPES}from'./spaceRecord.js';", "import{cleanGrowingSpaceForType,SOIL_SPACE_TYPES}from'./spaceRecord.js';\nimport{gardenSetupInventory}from'./setupOnboarding.js';")
          replace('src/BedWorkspace.jsx',"export default function BedWorkspace({garden,setModal,manageSpace,saveSpace})", "export default function BedWorkspace({garden,setModal,manageSpace,saveSpace,navigate,onConfirmGardenSetup})")
          replace('src/BedWorkspace.jsx',"const visible=(garden.spaces||[]).filter(s=>!s.hidden&&!s.deletedAt),hidden=(garden.spaces||[]).filter(s=>s.hidden&&!s.deletedAt),plants=(garden.plants||[]).filter(p=>!p.archived&&!p.deletedAt),space=visible.concat(hidden).find(s=>s.id===selected),spacePlants=space?plants.filter(p=>p.spaceId===space.id):[],publicSpace=visible.concat(hidden).find(s=>s.id===queryBed),publicPlants=publicSpace?plants.filter(p=>p.spaceId===publicSpace.id):[];", "const visible=(garden.spaces||[]).filter(s=>!s.hidden&&!s.deletedAt),hidden=(garden.spaces||[]).filter(s=>s.hidden&&!s.deletedAt),plants=(garden.plants||[]).filter(p=>!p.archived&&!p.deletedAt),setup=gardenSetupInventory(garden),setupOpen=!garden.profile?.setupGardenConfirmedAt,needsSpace=setupOpen&&!setup.hasSpace,needsPlant=setupOpen&&setup.hasSpace&&!setup.hasConnectedPlant,needsReview=setupOpen&&setup.hasConnectedPlant,space=visible.concat(hidden).find(s=>s.id===selected),spacePlants=space?plants.filter(p=>p.spaceId===space.id):[],publicSpace=visible.concat(hidden).find(s=>s.id===queryBed),publicPlants=publicSpace?plants.filter(p=>p.spaceId===publicSpace.id):[];")
          replace('src/BedWorkspace.jsx',"<div className=\"garden-actions\"><button onClick={()=>setModal({type:'addPlant'})}><Sprout/>Add plant</button><button onClick={()=>setModal({type:'addSpace'})}><Plus/>Add Growing Space</button></div>{visible.map", "<div className=\"garden-actions\"><button className={needsPlant?'is-setup-primary':''} onClick={()=>setModal({type:'addPlant'})}><Sprout/>Add plant</button><button className={needsSpace?'is-setup-primary':''} onClick={()=>setModal({type:'addSpace'})}><Plus/>Add Growing Space</button></div>{needsSpace&&<p className=\"garden-setup-hint\">Start by adding the place where something is growing.</p>}{needsPlant&&<p className=\"garden-setup-hint\">Your Growing Space is ready. Now add what is growing there.</p>}{needsReview&&<section className=\"garden-setup-confirmation\"><BookOpen/><span><strong>Does your garden setup look right?</strong><p>Review the Growing Spaces and plants below. Confirm when the current setup looks correct.</p></span><button type=\"button\" onClick={()=>{onConfirmGardenSetup?.();navigate('today')}}>Yes, This Looks Right</button></section>}<button type=\"button\" className=\"garden-history-entry\" onClick={()=>navigate('memory')} aria-label=\"Garden History. Review garden activity, harvests, problems, and photos.\"><BookOpen/><span><strong>Garden History</strong><small>Review garden activity, harvests, problems, and photos.</small></span><ChevronRight/></button>{visible.map")

          replace('src/GardenMemory.jsx',"eyebrow=\"RECORDS & EXTRAS\"", "eyebrow=\"GARDEN RECORDS\"")

          replace('src/App.jsx',"import{pageFromPopState,readInitialPage,syncPageUrl}from'./pageRouting.js';", "import{pageFromPopState,readInitialPage,syncPageUrl}from'./pageRouting.js';\nimport{beginGardenSetupReview,completeFreshGardenSetup,confirmGardenSetup,mergeSetupProfile}from'./setupOnboarding.js';")
          replace('src/App.jsx',"const updateProfile=patch=>{setGarden(current=>({...current,profile:{...(current.profile||{}),...patch}}));showToast('Garden settings saved.')};", "const updateProfile=patch=>{const now=new Date().toISOString();setGarden(current=>({...current,profile:mergeSetupProfile(current.profile||{},patch,now)}));showToast('Garden settings saved.')};\n const beginSetupGarden=()=>setGarden(current=>({...current,profile:beginGardenSetupReview(current.profile||{},current)}));\n const confirmSetupGarden=()=>setGarden(current=>({...current,profile:confirmGardenSetup(current.profile||{})}));")
          replace('src/App.jsx',"profile:{...seedState.profile,setupComplete:true},seedUsage", "profile:completeFreshGardenSetup(seedState.profile||{},{...seedState,plants:[...(seedState.plants||[]),plant]},now),seedUsage")
          replace('src/App.jsx',"<TodayWorkspace profile={garden.profile} garden={garden} tasks={boardTasks} tomorrowTasks={tomorrowTasks} dailyDone={daily.done} noticeOpen={noticeOpen} setNoticeOpen={setNoticeOpen} weatherState={weatherState} weatherAlert={weatherAlert} weatherGuidance={weatherGuidance} onWeatherDecision={handleWeatherDecision} activity={garden.activity} seasonMode={seasonMode} navigate={navigate} onTask={openTask}/>", "<TodayWorkspace profile={garden.profile} garden={garden} tasks={boardTasks} tomorrowTasks={tomorrowTasks} dailyDone={daily.done} noticeOpen={noticeOpen} setNoticeOpen={setNoticeOpen} weatherState={weatherState} weatherAlert={weatherAlert} weatherGuidance={weatherGuidance} onWeatherDecision={handleWeatherDecision} activity={garden.activity} seasonMode={seasonMode} navigate={navigate} onTask={openTask} onBeginGardenSetup={beginSetupGarden}/>")
          replace('src/App.jsx',"<BedWorkspace garden={garden} setModal={requestModal} manageSpace={manageSpace} saveSpace={saveSpace}/>", "<BedWorkspace garden={garden} setModal={requestModal} manageSpace={manageSpace} saveSpace={saveSpace} navigate={navigate} onConfirmGardenSetup={confirmSetupGarden}/>")

          replace('src/main.jsx',"import './styles/phase-4-8-3-first-time-clarity.css';", "import './styles/phase-4-8-3-first-time-clarity.css';\nimport './styles/phase-4-8-3b-garden-history.css';")
          Path('src/styles/phase-4-8-3b-garden-history.css').write_text(""".garden-history-entry{width:100%;min-height:56px;margin:12px 0 16px;padding:12px 14px;border:1px solid rgba(31,75,49,.18);border-radius:16px;background:#fffaf0;color:#1f4b31;display:grid;grid-template-columns:32px minmax(0,1fr) 20px;align-items:center;gap:12px;text-align:left}.garden-history-entry span{min-width:0;display:grid;gap:3px}.garden-history-entry strong{font-size:1rem}.garden-history-entry small{font-size:.82rem;line-height:1.35;color:#4b6656;white-space:normal}.garden-history-entry>svg:last-child{width:18px}.garden-history-entry:focus-visible,.garden-setup-confirmation button:focus-visible,.garden-setup-steps button:focus-visible{outline:3px solid #d89a2b;outline-offset:3px}.garden-actions .is-setup-primary{box-shadow:0 0 0 3px rgba(216,154,43,.35);font-weight:800}.garden-setup-hint{margin:-4px 0 10px;font-size:.86rem;color:#385845}.garden-setup-confirmation{margin:10px 0 12px;padding:14px;border-radius:16px;background:#fffaf0;border:1px solid rgba(31,75,49,.18);display:grid;grid-template-columns:28px minmax(0,1fr);gap:10px;color:#1f4b31}.garden-setup-confirmation p{margin:4px 0 10px}.garden-setup-confirmation button{grid-column:1/-1;min-height:48px;border-radius:12px}.garden-setup-steps{list-style:none;padding:0;margin:12px 0 0;display:grid;gap:8px}.garden-setup-steps li>button{width:100%;min-height:56px;border-radius:14px;display:grid;grid-template-columns:28px minmax(0,1fr) 18px;align-items:center;gap:10px;text-align:left}.garden-setup-steps li>button span:nth-child(2){display:grid;gap:3px}.garden-setup-steps p{margin:0;line-height:1.35}.garden-setup-steps em{font-style:normal;font-weight:750}.garden-setup-steps .setup-step-marker{display:grid;place-items:center;width:26px;height:26px;border-radius:50%;background:#edf3e6}.garden-setup-steps li:not(.is-next){opacity:.82}@media(max-width:340px){.garden-history-entry{grid-template-columns:28px minmax(0,1fr) 18px;padding:11px}.garden-history-entry small{font-size:.78rem}.garden-setup-confirmation{padding:12px}}
""")

          replace('src/version.js',"export const BUILD_ID='phase-4-8-3-first-time-clarity';", "export const BUILD_ID='phase-4-8-3b-garden-history-entry';")
          replace('src/version.js',"export const WHATS_NEW=[", "export const WHATS_NEW=[\n 'Garden History is now available directly from Garden.',")
          replace('public/sw.js',"const CACHE = 'brookes-garden-v0483-first-time-clarity-20260723';", "const CACHE = 'brookes-garden-v0483b-garden-history-entry-20260723';")
          replace('server/index.js',"phase:'4.8.3',buildId:'phase-4-8-3-first-time-clarity'", "phase:'4.8.3b',buildId:'phase-4-8-3b-garden-history-entry'")

          Path('test/phase483bGardenHistory.test.js').write_text("""import test from'node:test';
import assert from'node:assert/strict';
import{readFile}from'node:fs/promises';
import{beginGardenSetupReview,completeFreshGardenSetup,confirmGardenSetup,gardenSetupInventory,mergeSetupProfile,setupChecklistState}from'../src/setupOnboarding.js';
const read=path=>readFile(path,'utf8');
const garden=(spaces=[],plants=[],profile={})=>({profile,spaces,plants,activity:[{id:'a1'}],harvests:[{id:'h1'}],problems:[{id:'p1'}],photos:[{id:'ph1'}]});
test('Garden exposes the one visible memory doorway while Tool Shed does not',async()=>{const[bed,app,memory,tools]=await Promise.all(['src/BedWorkspace.jsx','src/App.jsx','src/GardenMemory.jsx','src/ToolShed.jsx'].map(read));assert.match(bed,/className=\"garden-history-entry\"/);assert.match(bed,/type=\"button\"/);assert.match(bed,/Garden History/);assert.match(bed,/Review garden activity, harvests, problems, and photos\./);assert.match(bed,/navigate\('memory'\)/);assert.match(app,/page==='memory'/);assert.match(app,/readInitialPage/);assert.match(memory,/title=\"Garden History\"/);assert.match(memory,/eyebrow=\"GARDEN RECORDS\"/);assert.match(memory,/navigate\('garden'\)/);assert.doesNotMatch(tools,/title=\"Garden History\"/)});
test('history entry is before Growing Space cards and independent of counts',async()=>{const bed=await read('src/BedWorkspace.jsx'),entry=bed.indexOf('garden-history-entry'),cards=bed.indexOf('{visible.map');assert.ok(entry>0&&entry<cards);assert.doesNotMatch(bed,/0 history|history count/i)});
test('opening history is presentation-only and preserves record IDs and lengths',()=>{const source=garden([],[],{}),before=structuredClone(source);gardenSetupInventory(source);assert.deepEqual(source,before)});
test('checklist shrinks without numbered STEP labels',async()=>{const home=await read('src/UrgentHome.jsx');assert.doesNotMatch(home,/STEP \{number\}|SetupStep|number=\{/);assert.match(home,/Confirm Garden Details/);assert.match(home,/Add a Growing Space & Plants/);assert.match(home,/navigate\('garden'\)/);assert.doesNotMatch(home,/garden-open-add-space|plan-plant/)});
test('details confirmation never silently completes Garden setup',()=>{const existing=garden([{id:'s1'}],[{id:'p1',spaceId:'s1'}],{}),started=beginGardenSetupReview(existing.profile,existing,'2026-07-23T10:00:00.000Z'),afterDetails=mergeSetupProfile(started,{gardenName:'Runyan Garden',setupDetailsConfirmedAt:'2026-07-23T10:01:00.000Z'},'2026-07-23T10:01:00.000Z');assert.ok(afterDetails.setupDetailsConfirmedAt);assert.equal(afterDetails.setupGardenConfirmedAt,undefined);assert.equal(afterDetails.setupCompletedAt,undefined);const state=setupChecklistState(afterDetails,existing);assert.equal(state.gardenItemTitle,'Review Growing Spaces & Plants');assert.equal(state.complete,false)});
test('fresh setup completes only after connected active records are created',()=>{const profile=beginGardenSetupReview({},garden(), '2026-07-23T10:00:00.000Z'),withSpace=garden([{id:'s1'}],[],profile),notYet=completeFreshGardenSetup(profile,withSpace,'2026-07-23T10:02:00.000Z');assert.equal(notYet.setupGardenConfirmedAt,undefined);const withPlant=garden([{id:'s1'}],[{id:'p1',spaceId:'s1'}],profile),done=completeFreshGardenSetup(profile,withPlant,'2026-07-23T10:03:00.000Z');assert.ok(done.setupGardenConfirmedAt);assert.equal(done.setupCompletedAt,undefined);const completed=mergeSetupProfile(done,{setupDetailsConfirmedAt:'2026-07-23T10:04:00.000Z'},'2026-07-23T10:04:00.000Z');assert.ok(completed.setupCompletedAt)});
test('hidden deleted archived and orphaned records never satisfy active setup',()=>{const state=setupChecklistState({setupDetailsConfirmedAt:'x'},garden([{id:'hidden',hidden:true},{id:'deleted',deletedAt:'x'}],[{id:'a',spaceId:'hidden'},{id:'b',spaceId:'deleted'},{id:'c',spaceId:'missing'},{id:'d',spaceId:'missing',archived:true}]));assert.equal(state.hasSpace,false);assert.equal(state.hasConnectedPlant,false);assert.equal(state.complete,false)});
test('existing connected records require explicit review and confirmation',()=>{const existing=garden([{id:'s1'}],[{id:'p1',spaceId:'s1'}],{}),started=beginGardenSetupReview({},existing,'2026-07-23T10:00:00.000Z');assert.equal(started.setupGardenNeedsExplicitReview,true);assert.equal(completeFreshGardenSetup(started,existing,'2026-07-23T10:01:00.000Z').setupGardenConfirmedAt,undefined);const confirmed=confirmGardenSetup({...started,setupDetailsConfirmedAt:'x'},'2026-07-23T10:02:00.000Z');assert.ok(confirmed.setupGardenConfirmedAt);assert.ok(confirmed.setupCompletedAt)});
test('profile merges preserve confirmation timestamps through repeat saves',()=>{const profile={setupDetailsConfirmedAt:'details',setupGardenConfirmedAt:'garden',setupCompletedAt:'complete',other:'keep'},once=mergeSetupProfile(profile,{gardenName:'One'}),twice=mergeSetupProfile(once,{gardenName:'Two'});assert.equal(twice.setupDetailsConfirmedAt,'details');assert.equal(twice.setupGardenConfirmedAt,'garden');assert.equal(twice.setupCompletedAt,'complete');assert.equal(twice.other,'keep')});
test('release identifiers remain 0.21.1 and identify Phase 4.8.3b',async()=>{const[version,server,sw,main]=await Promise.all(['src/version.js','server/index.js','public/sw.js','src/main.jsx'].map(read));assert.match(version,/APP_VERSION='0\.21\.1'/);assert.match(version,/phase-4-8-3b-garden-history-entry/);assert.match(server,/phase:'4\.8\.3b'/);assert.match(server,/buildId:'phase-4-8-3b-garden-history-entry'/);assert.match(sw,/brookes-garden-v0483b-garden-history-entry-20260723/);assert.match(main,/phase-4-8-3b-garden-history\.css/)});
""")

          Path('.github/workflows/phase483b-apply.yml').unlink()
          PY
      - name: Install dependencies
        run: npm ci
      - name: Run complete tests
        run: npm test
      - name: Build production app
        run: npm run build
      - name: Commit correction
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Restore Garden History entry on Garden"
          git push origin HEAD:phase-4-8-3b-restore-garden-history
