name: Apply Phase 4.8.3b Garden History Patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'phase-4-8-3b-restore-garden-history'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-4-8-3b-restore-garden-history
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply focused source patch
        run: |
          cat > /tmp/patch.py <<'PY'
          from pathlib import Path
          def rep(path,old,new):
            p=Path(path); t=p.read_text()
            if old not in t: raise SystemExit(f'missing expected text in {path}: {old[:120]}')
            p.write_text(t.replace(old,new,1))

          Path('src/setupOnboarding.js').write_text("""export const activeGrowingSpaces=(garden={})=>(garden.spaces||[]).filter(space=>!space.hidden&&!space.deletedAt);
export const connectedActivePlants=(garden={})=>{const ids=new Set(activeGrowingSpaces(garden).map(space=>space.id));return(garden.plants||[]).filter(plant=>!plant.archived&&!plant.deletedAt&&ids.has(plant.spaceId))};
export const gardenSetupInventory=(garden={})=>{const spaces=activeGrowingSpaces(garden),plants=connectedActivePlants(garden);return{spaces,plants,hasSpace:spaces.length>0,hasConnectedPlant:plants.length>0}};
export function mergeSetupProfile(profile={},patch={},now=new Date().toISOString()){const next={...profile,...patch};if(next.setupDetailsConfirmedAt&&next.setupGardenConfirmedAt&&!next.setupCompletedAt)next.setupCompletedAt=now;return next}
export function beginGardenSetupReview(profile={},garden={},now=new Date().toISOString()){if(profile.setupGardenConfirmedAt)return profile;const inventory=gardenSetupInventory(garden);return mergeSetupProfile(profile,{setupGardenStartedAt:profile.setupGardenStartedAt||now,setupGardenNeedsExplicitReview:Boolean(inventory.hasConnectedPlant)},now)}
export const confirmGardenSetup=(profile={},now=new Date().toISOString())=>mergeSetupProfile(profile,{setupGardenConfirmedAt:profile.setupGardenConfirmedAt||now},now);
export function completeFreshGardenSetup(profile={},garden={},now=new Date().toISOString()){if(profile.setupGardenConfirmedAt||!profile.setupGardenStartedAt||profile.setupGardenNeedsExplicitReview)return profile;const inventory=gardenSetupInventory(garden);return inventory.hasSpace&&inventory.hasConnectedPlant?confirmGardenSetup(profile,now):profile}
export function setupChecklistState(profile={},garden={}){const inventory=gardenSetupInventory(garden),detailsConfirmed=Boolean(profile.setupDetailsConfirmedAt),gardenConfirmed=Boolean(profile.setupGardenConfirmedAt);return{...inventory,detailsConfirmed,gardenConfirmed,complete:Boolean(detailsConfirmed&&gardenConfirmed),gardenItemTitle:inventory.hasConnectedPlant?'Review Growing Spaces & Plants':'Add a Growing Space & Plants',gardenItemDescription:inventory.hasConnectedPlant?'Your garden already contains Growing Spaces and plantings. Review them and confirm that everything looks right.':inventory.hasSpace?'Your Growing Space is ready. Add the first plant growing there.':'Set up a bed, container, grow bag, greenhouse area, tray, or indoor setup, then add what is growing there.',gardenItemAction:inventory.hasConnectedPlant?'Review Garden':'Open Garden'}}
""")

          rep('src/UrgentHome.jsx',"import{formatUrgentBadge}from'./urgentGardenAlerts.js';","import{formatUrgentBadge}from'./urgentGardenAlerts.js';\nimport{setupChecklistState}from'./setupOnboarding.js';")
          p=Path('src/UrgentHome.jsx'); t=p.read_text(); a=t.index('function SetupStep('); b=t.index('if(primary)return',a)
          replacement="""function SetupItem({title,text,action,current,onClick}){return <li className={current?'is-next':''}><button type=\"button\" onClick={onClick} aria-current={current?'step':undefined} aria-label={`${title}. ${text} ${action}`}><span className=\"setup-step-marker\" aria-label=\"Not complete\"><Check/></span><span><strong>{title}</strong><p>{text}</p><em>{action}</em></span><ChevronRight/></button></li>}
export function SimplifiedTodayCard({profile,garden,urgentAlerts=[],navigate,onOpenAlerts,onBeginGardenSetup}){const setup=setupChecklistState(profile,garden),primary=urgentAlerts[0];if(!setup.complete)return <section className=\"what-matters-today today-summary-card is-onboarding setup-progress-card\" aria-labelledby=\"what-matters-today-title\"><div className=\"today-summary-copy\"><small>TODAY</small><h2 id=\"what-matters-today-title\">Let’s set up your garden</h2><p>Complete these basics so Garden Compass knows what belongs in your garden.</p></div><ul className=\"garden-setup-steps\">{!setup.detailsConfirmed&&<SetupItem title=\"Confirm Garden Details\" text=\"Review the garden name, gardener, Green Bay location, and frost dates.\" action=\"Review Details\" current onClick={()=>navigate('admin-profile')}/>} {!setup.gardenConfirmed&&<SetupItem title={setup.gardenItemTitle} text={setup.gardenItemDescription} action={setup.gardenItemAction} current={setup.detailsConfirmed} onClick={()=>{onBeginGardenSetup?.();navigate('garden')}}/>}</ul></section>;"""
          p.write_text(t[:a]+replacement+t[b:])

          rep('src/WorkspaceScreens.jsx',"export function TodayWorkspace({profile,garden,tasks,dailyDone,noticeOpen,setNoticeOpen,weatherState,weatherAlert,weatherGuidance,activity,navigate,onTask,tomorrowTasks=[]})","export function TodayWorkspace({profile,garden,tasks,dailyDone,noticeOpen,setNoticeOpen,weatherState,weatherAlert,weatherGuidance,activity,navigate,onTask,onBeginGardenSetup,tomorrowTasks=[]})")
          rep('src/WorkspaceScreens.jsx',"<SimplifiedTodayCard profile={profile} garden={garden} urgentAlerts={urgentAlerts} setupTask={setupTask} onTask={onTask} navigate={navigate} onOpenAlerts={()=>setNoticeOpen(true)}/>","<SimplifiedTodayCard profile={profile} garden={garden} urgentAlerts={urgentAlerts} navigate={navigate} onOpenAlerts={()=>setNoticeOpen(true)} onBeginGardenSetup={onBeginGardenSetup}/>")

          rep('src/AdminScreens.jsx',"function ProfileScreen({garden,onUpdateProfile})","const confirmDetails=(profile,patch)=>({...patch,setupDetailsConfirmedAt:profile?.setupDetailsConfirmedAt||new Date().toISOString()});\nfunction ProfileScreen({garden,onUpdateProfile})")
          rep('src/AdminScreens.jsx',"onUpdateProfile({gardenName:name.trim()||'The Runyan Garden'})","onUpdateProfile(confirmDetails(garden.profile,{gardenName:name.trim()||'The Runyan Garden'}))")
          rep('src/AdminScreens.jsx',"onUpdateProfile(draft)","onUpdateProfile(confirmDetails(garden.profile,draft))")

          rep('src/BedWorkspace.jsx',"import{ArrowDown,ArrowLeft,ArrowUp,Camera,ChevronRight,Copy,ExternalLink,Eye,EyeOff,ImageOff,Leaf,Pencil,Plus,QrCode,ScanLine,Sprout,Trash2,X}from'lucide-react';","import{ArrowDown,ArrowLeft,ArrowUp,BookOpen,Camera,ChevronRight,Copy,ExternalLink,Eye,EyeOff,ImageOff,Leaf,Pencil,Plus,QrCode,ScanLine,Sprout,Trash2,X}from'lucide-react';")
          rep('src/BedWorkspace.jsx',"import{cleanGrowingSpaceForType,SOIL_SPACE_TYPES}from'./spaceRecord.js';","import{cleanGrowingSpaceForType,SOIL_SPACE_TYPES}from'./spaceRecord.js';\nimport{gardenSetupInventory}from'./setupOnboarding.js';")
          rep('src/BedWorkspace.jsx',"export default function BedWorkspace({garden,setModal,manageSpace,saveSpace})","export default function BedWorkspace({garden,setModal,manageSpace,saveSpace,navigate,onConfirmGardenSetup})")
          rep('src/BedWorkspace.jsx',"const visible=(garden.spaces||[]).filter(s=>!s.hidden&&!s.deletedAt),hidden=(garden.spaces||[]).filter(s=>s.hidden&&!s.deletedAt),plants=(garden.plants||[]).filter(p=>!p.archived&&!p.deletedAt),space=visible.concat(hidden).find(s=>s.id===selected),spacePlants=space?plants.filter(p=>p.spaceId===space.id):[],publicSpace=visible.concat(hidden).find(s=>s.id===queryBed),publicPlants=publicSpace?plants.filter(p=>p.spaceId===publicSpace.id):[];","const visible=(garden.spaces||[]).filter(s=>!s.hidden&&!s.deletedAt),hidden=(garden.spaces||[]).filter(s=>s.hidden&&!s.deletedAt),plants=(garden.plants||[]).filter(p=>!p.archived&&!p.deletedAt),setup=gardenSetupInventory(garden),setupOpen=!garden.profile?.setupGardenConfirmedAt,needsSpace=setupOpen&&!setup.hasSpace,needsPlant=setupOpen&&setup.hasSpace&&!setup.hasConnectedPlant,needsReview=setupOpen&&setup.hasConnectedPlant,space=visible.concat(hidden).find(s=>s.id===selected),spacePlants=space?plants.filter(p=>p.spaceId===space.id):[],publicSpace=visible.concat(hidden).find(s=>s.id===queryBed),publicPlants=publicSpace?plants.filter(p=>p.spaceId===publicSpace.id):[];")
          rep('src/BedWorkspace.jsx',"<div className=\"garden-actions\"><button onClick={()=>setModal({type:'addPlant'})}><Sprout/>Add plant</button><button onClick={()=>setModal({type:'addSpace'})}><Plus/>Add Growing Space</button></div>{visible.map","<div className=\"garden-actions\"><button className={needsPlant?'is-setup-primary':''} onClick={()=>setModal({type:'addPlant'})}><Sprout/>Add plant</button><button className={needsSpace?'is-setup-primary':''} onClick={()=>setModal({type:'addSpace'})}><Plus/>Add Growing Space</button></div>{needsSpace&&<p className=\"garden-setup-hint\">Start by adding the place where something is growing.</p>}{needsPlant&&<p className=\"garden-setup-hint\">Your Growing Space is ready. Now add what is growing there.</p>}{needsReview&&<section className=\"garden-setup-confirmation\"><BookOpen/><span><strong>Does your garden setup look right?</strong><p>Review the Growing Spaces and plants below. Confirm when the current setup looks correct.</p></span><button type=\"button\" onClick={()=>{onConfirmGardenSetup?.();navigate('today')}}>Yes, This Looks Right</button></section>}<button type=\"button\" className=\"garden-history-entry\" onClick={()=>navigate('memory')} aria-label=\"Garden History. Review garden activity, harvests, problems, and photos.\"><BookOpen/><span><strong>Garden History</strong><small>Review garden activity, harvests, problems, and photos.</small></span><ChevronRight/></button>{visible.map")

          rep('src/GardenMemory.jsx','eyebrow="RECORDS & EXTRAS"','eyebrow="GARDEN RECORDS"')
          rep('src/App.jsx',"import{pageFromPopState,readInitialPage,syncPageUrl}from'./pageRouting.js';","import{pageFromPopState,readInitialPage,syncPageUrl}from'./pageRouting.js';\nimport{beginGardenSetupReview,completeFreshGardenSetup,confirmGardenSetup,mergeSetupProfile}from'./setupOnboarding.js';")
          rep('src/App.jsx',"const updateProfile=patch=>{setGarden(current=>({...current,profile:{...(current.profile||{}),...patch}}));showToast('Garden settings saved.')};","const updateProfile=patch=>{const now=new Date().toISOString();setGarden(current=>({...current,profile:mergeSetupProfile(current.profile||{},patch,now)}));showToast('Garden settings saved.')};\n const beginSetupGarden=()=>setGarden(current=>({...current,profile:beginGardenSetupReview(current.profile||{},current)}));\n const confirmSetupGarden=()=>setGarden(current=>({...current,profile:confirmGardenSetup(current.profile||{})}));")
          rep('src/App.jsx','profile:{...seedState.profile,setupComplete:true},seedUsage','profile:completeFreshGardenSetup(seedState.profile||{},{...seedState,plants:[...(seedState.plants||[]),plant]},now),seedUsage')
          rep('src/App.jsx','onTask={openTask}/>','onTask={openTask} onBeginGardenSetup={beginSetupGarden}/>')
          rep('src/App.jsx','<BedWorkspace garden={garden} setModal={requestModal} manageSpace={manageSpace} saveSpace={saveSpace}/>','<BedWorkspace garden={garden} setModal={requestModal} manageSpace={manageSpace} saveSpace={saveSpace} navigate={navigate} onConfirmGardenSetup={confirmSetupGarden}/>')

          rep('src/main.jsx',"import './styles/phase-4-8-3-first-time-clarity.css';","import './styles/phase-4-8-3-first-time-clarity.css';\nimport './styles/phase-4-8-3b-garden-history.css';")
          Path('src/styles/phase-4-8-3b-garden-history.css').write_text(""".garden-history-entry{width:100%;min-height:56px;margin:12px 0 16px;padding:12px 14px;border:1px solid rgba(31,75,49,.18);border-radius:16px;background:#fffaf0;color:#1f4b31;display:grid;grid-template-columns:32px minmax(0,1fr) 20px;align-items:center;gap:12px;text-align:left}.garden-history-entry span{min-width:0;display:grid;gap:3px}.garden-history-entry small{font-size:.82rem;line-height:1.35;color:#4b6656;white-space:normal}.garden-history-entry:focus-visible,.garden-setup-confirmation button:focus-visible,.garden-setup-steps button:focus-visible{outline:3px solid #d89a2b;outline-offset:3px}.garden-actions .is-setup-primary{box-shadow:0 0 0 3px rgba(216,154,43,.35);font-weight:800}.garden-setup-hint{margin:-4px 0 10px;font-size:.86rem;color:#385845}.garden-setup-confirmation{margin:10px 0 12px;padding:14px;border-radius:16px;background:#fffaf0;border:1px solid rgba(31,75,49,.18);display:grid;grid-template-columns:28px minmax(0,1fr);gap:10px;color:#1f4b31}.garden-setup-confirmation p{margin:4px 0 10px}.garden-setup-confirmation button{grid-column:1/-1;min-height:48px;border-radius:12px}.garden-setup-steps{list-style:none;padding:0;margin:12px 0 0;display:grid;gap:8px}.garden-setup-steps li>button{width:100%;min-height:56px;border-radius:14px;display:grid;grid-template-columns:28px minmax(0,1fr) 18px;align-items:center;gap:10px;text-align:left}.garden-setup-steps li>button span:nth-child(2){display:grid;gap:3px}.garden-setup-steps p{margin:0;line-height:1.35}.garden-setup-steps em{font-style:normal;font-weight:750}.garden-setup-steps .setup-step-marker{display:grid;place-items:center;width:26px;height:26px;border-radius:50%;background:#edf3e6}.garden-setup-steps li:not(.is-next){opacity:.82}@media(max-width:340px){.garden-history-entry{grid-template-columns:28px minmax(0,1fr) 18px;padding:11px}.garden-history-entry small{font-size:.78rem}.garden-setup-confirmation{padding:12px}}""")
          rep('src/version.js',"export const BUILD_ID='phase-4-8-3-first-time-clarity';","export const BUILD_ID='phase-4-8-3b-garden-history-entry';")
          rep('src/version.js','export const WHATS_NEW=[','export const WHATS_NEW=[\n \'Garden History is now available directly from Garden.\',')
          rep('public/sw.js',"const CACHE = 'brookes-garden-v0483-first-time-clarity-20260723';","const CACHE = 'brookes-garden-v0483b-garden-history-entry-20260723';")
          rep('server/index.js',"phase:'4.8.3',buildId:'phase-4-8-3-first-time-clarity'","phase:'4.8.3b',buildId:'phase-4-8-3b-garden-history-entry'")

          Path('test/phase483bGardenHistory.test.js').write_text("""import test from'node:test';import assert from'node:assert/strict';import{readFile}from'node:fs/promises';import{beginGardenSetupReview,completeFreshGardenSetup,confirmGardenSetup,gardenSetupInventory,mergeSetupProfile,setupChecklistState}from'../src/setupOnboarding.js';const read=p=>readFile(p,'utf8'),garden=(spaces=[],plants=[],profile={})=>({profile,spaces,plants,activity:[{id:'a1'}],harvests:[{id:'h1'}],problems:[{id:'p1'}],photos:[{id:'ph1'}]});
test('Garden exposes memory while Tool Shed does not',async()=>{const[b,a,m,t]=await Promise.all(['src/BedWorkspace.jsx','src/App.jsx','src/GardenMemory.jsx','src/ToolShed.jsx'].map(read));assert.match(b,/garden-history-entry/);assert.match(b,/Review garden activity, harvests, problems, and photos\./);assert.match(b,/navigate\('memory'\)/);assert.match(a,/page==='memory'/);assert.match(m,/title=\"Garden History\"/);assert.match(m,/eyebrow=\"GARDEN RECORDS\"/);assert.match(m,/navigate\('garden'\)/);assert.doesNotMatch(t,/title=\"Garden History\"/)});
test('history navigation is data-neutral',()=>{const g=garden([],[],{}),before=structuredClone(g);gardenSetupInventory(g);assert.deepEqual(g,before)});
test('checklist is shrinking and unnumbered',async()=>{const h=await read('src/UrgentHome.jsx');assert.doesNotMatch(h,/SetupStep|STEP \{number\}/);assert.match(h,/Confirm Garden Details/);assert.match(h,/Add a Growing Space & Plants/);assert.match(h,/navigate\('garden'\)/);assert.doesNotMatch(h,/garden-open-add-space|plan-plant/)});
test('details save cannot complete garden setup',()=>{const g=garden([{id:'s'}],[{id:'p',spaceId:'s'}]),started=beginGardenSetupReview({},g,'start'),details=mergeSetupProfile(started,{setupDetailsConfirmedAt:'details'});assert.equal(details.setupGardenConfirmedAt,undefined);assert.equal(details.setupCompletedAt,undefined);assert.equal(setupChecklistState(details,g).gardenItemTitle,'Review Growing Spaces & Plants')});
test('fresh setup needs a connected active plant',()=>{const p=beginGardenSetupReview({},garden(), 'start');assert.equal(completeFreshGardenSetup(p,garden([{id:'s'}],[]),'one').setupGardenConfirmedAt,undefined);const done=completeFreshGardenSetup(p,garden([{id:'s'}],[{id:'p',spaceId:'s'}]),'two');assert.ok(done.setupGardenConfirmedAt);assert.equal(done.setupCompletedAt,undefined)});
test('hidden deleted archived orphaned records do not count',()=>{const s=setupChecklistState({setupDetailsConfirmedAt:'x'},garden([{id:'h',hidden:true},{id:'d',deletedAt:'x'}],[{id:'1',spaceId:'h'},{id:'2',spaceId:'missing'},{id:'3',spaceId:'d',archived:true}]));assert.equal(s.hasSpace,false);assert.equal(s.hasConnectedPlant,false)});
test('existing records need explicit confirmation',()=>{const g=garden([{id:'s'}],[{id:'p',spaceId:'s'}]),p=beginGardenSetupReview({setupDetailsConfirmedAt:'d'},g,'start');assert.equal(p.setupGardenNeedsExplicitReview,true);assert.equal(completeFreshGardenSetup(p,g,'later').setupGardenConfirmedAt,undefined);const done=confirmGardenSetup(p,'confirm');assert.ok(done.setupCompletedAt)});
test('profile merges preserve setup timestamps',()=>{const p={setupDetailsConfirmedAt:'d',setupGardenConfirmedAt:'g',setupCompletedAt:'c',other:'x'},n=mergeSetupProfile(p,{gardenName:'New'});assert.equal(n.setupDetailsConfirmedAt,'d');assert.equal(n.setupGardenConfirmedAt,'g');assert.equal(n.setupCompletedAt,'c');assert.equal(n.other,'x')});
test('release remains 0.21.1 with Phase 4.8.3b IDs',async()=>{const[v,s,w,m]=await Promise.all(['src/version.js','server/index.js','public/sw.js','src/main.jsx'].map(read));assert.match(v,/APP_VERSION='0\.21\.1'/);assert.match(v,/phase-4-8-3b-garden-history-entry/);assert.match(s,/phase:'4\.8\.3b'/);assert.match(w,/v0483b-garden-history-entry/);assert.match(m,/phase-4-8-3b-garden-history\.css/)})
""")
          Path('.github/workflows/phase483b-apply.yml').unlink()
          PY
          python3 /tmp/patch.py
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Commit tested patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Restore Garden History entry on Garden"
          git push origin HEAD:phase-4-8-3b-restore-garden-history
