name: Apply Phase 4.6X.1 Implementation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-validated-phase:
    if: github.event.pull_request.head.ref == 'agent/phase-4-6x-1-seed-trust-speed'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out protected feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reconstruct and verify implementation patch
        run: |
          set -euo pipefail
          cat .github/phase46x1_patch/*.patch > /tmp/phase46x1.patch
          echo '0438e9c7484f6291f0720daed5aeb91299cdf2aa7b3065629733f110ac27f91d  /tmp/phase46x1.patch' | sha256sum --check
          git apply --check /tmp/phase46x1.patch
          git apply --index /tmp/phase46x1.patch
      - name: Install dependencies
        run: npm install
      - name: Run targeted Seed Packet tests
        run: node --test test/seedPacketIntelligence.test.js test/seedProductLookup.test.js test/seedPacketTrustSpeed.test.js test/gardenPersistence.test.js
      - name: Build production app
        run: npm run build
      - name: Remove temporary delivery files
        run: |
          rm -rf .github/phase46x1_patch
          rm -f .github/workflows/phase46x1-export.yml .github/workflows/phase46x1-apply.yml
          git add -A
      - name: Commit Phase 4.6X.1 implementation
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Implement Phase 4.6X.1 seed packet trust and speed fix'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
