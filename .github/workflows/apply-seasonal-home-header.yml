name: Apply Seasonal Home Header

on:
  push:
    branches: [agent/seasonal-mobile-garden-header]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-seasonal-home-header
  cancel-in-progress: true

jobs:
  apply-seasonal-home:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/seasonal-mobile-garden-header
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply guarded component and version changes
        run: |
          node scripts/applySeasonalHomeHeader.mjs
          npm install --package-lock-only --ignore-scripts
      - name: Commit seasonal Home implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/WorkspaceScreens.jsx src/main.jsx src/version.js server/index.js package.json package-lock.json
          if git diff --cached --quiet; then
            echo "Seasonal Home source already applied."
            exit 0
          fi
          git commit -m "Apply seasonal Home header and Today card"
          git push origin HEAD:agent/seasonal-mobile-garden-header
