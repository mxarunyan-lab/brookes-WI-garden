name: Verify Render Phase 4.6X

on:
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  verify-render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      SHA: ${{ github.sha }}
    steps:
      - name: Poll deployed v0.20.0 and publish status
        run: |
          set -euo pipefail
          url='https://brookes-wi-garden.onrender.com/'
          status_api="https://api.github.com/repos/${REPO}/statuses/${SHA}"
          publish_status() {
            local state="$1" description="$2"
            curl -sS -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "$status_api" \
              -d "{\"state\":\"${state}\",\"context\":\"render/phase-4-6x\",\"description\":\"${description}\"}" >/dev/null
          }
          publish_status pending 'Waiting for Render v0.20.0'
          for attempt in $(seq 1 48); do
            http_status=$(curl -L -sS -o live-index.html -w '%{http_code}' --max-time 45 "$url" || true)
            if [ "$http_status" = '200' ]; then
              asset=$(grep -oE 'src="[^"]+\.js"' live-index.html | head -n1 | cut -d'"' -f2 || true)
              if [ -n "$asset" ]; then
                case "$asset" in
                  http*) asset_url="$asset" ;;
                  /*) asset_url="${url%/}${asset}" ;;
                  *) asset_url="${url}${asset}" ;;
                esac
                curl -L -sS --max-time 90 "$asset_url" -o live-app.js || true
                if grep -q 'phase-4-6x-pre-sync-readiness' live-app.js && grep -q '0.20.0' live-app.js; then
                  publish_status success 'Render serves Phase 4.6X v0.20.0'
                  exit 0
                fi
              fi
            fi
            sleep 15
          done
          publish_status failure 'Render v0.20.0 not verified'
          exit 1
