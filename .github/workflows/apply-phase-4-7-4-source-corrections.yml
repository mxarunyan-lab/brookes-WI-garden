name: Apply Phase 4.7.4 Source Corrections

on:
  push:
    branches: [agent/phase-4-7-4-certification]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase-4-7-4-source-corrections
  cancel-in-progress: true

jobs:
  apply-guarded-corrections:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out certification branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase-4-7-4-certification
          fetch-depth: 0
      - name: Apply focused release-candidate corrections
        run: |
          node scripts/applyPhase474ManualChoreHistory.mjs
          node scripts/applyPhase474PacketHealthHarness.mjs
      - name: Commit corrected source and certification harness
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.jsx src/yearRoundEngine.js scripts/verifyPhase474CriticalJourneys.mjs
          if git diff --cached --quiet; then
            echo "Focused Phase 4.7.4 corrections already applied."
            exit 0
          fi
          git commit -m "Harden packet capability certification"
          git push origin HEAD:agent/phase-4-7-4-certification
