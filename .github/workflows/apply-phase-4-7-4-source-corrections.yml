name: Apply Phase 4.7.4 Source Corrections

on:
  push:
    branches: [agent/phase-4-7-4-certification]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase-4-7-4-source-corrections
  cancel-in-progress: true

jobs:
  apply-guarded-corrections:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out certification branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase-4-7-4-certification
          fetch-depth: 0
      - name: Apply Chore Board lifecycle correction
        run: node scripts/applyPhase474ChoreLifecycle.mjs
      - name: Commit corrected lifecycle sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.jsx src/ChoreBoard.jsx src/ClearDetailModal.jsx src/yearRoundEngine.js
          if git diff --cached --quiet; then
            echo "Chore lifecycle correction already applied."
            exit 0
          fi
          git commit -m "Fix manual chore completion lifecycle"
          git push origin HEAD:agent/phase-4-7-4-certification
