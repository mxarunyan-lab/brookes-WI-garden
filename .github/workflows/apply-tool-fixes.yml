name: Apply Tool Shed Compatibility Fixes

on:
  push:
    branches: [apply-tool-fixes]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply exact packet spacing fallback
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('src/ToolUtilities.jsx')
          s=p.read_text()
          old="spacingText=choice?.exact?(choice.item.spacing||choice.crop?.spacing):(choice?.crop?.spacing||cropCatalog.find(crop=>crop.id===choice?.cropId)?.spacing)"
          new="spacingText=choice?.exact?(choice.item.spacing||cropCatalog.find(crop=>crop.id===choice?.cropId)?.spacing):(choice?.crop?.spacing||cropCatalog.find(crop=>crop.id===choice?.cropId)?.spacing)"
          if old not in s:
              raise SystemExit('Exact packet spacing fallback insertion point not found')
          p.write_text(s.replace(old,new,1))
          PY
      - name: Commit spacing fallback
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ToolUtilities.jsx
          git commit -m "Use crop spacing when exact packet omits spacing"
          git push origin HEAD:main
