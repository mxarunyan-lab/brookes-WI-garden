name: Apply Tool Shed Compatibility Fixes

on:
  push:
    branches: [apply-tool-fixes]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply compatibility fixes
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('src/ToolUtilities.jsx')
          s=p.read_text()
          s=s.replace("import{ArrowRight,Calculator,Clipboard,Copy,FileText,Frost,PackageSearch,Printer,Ruler,Seedling,Sprout}from'lucide-react';", "import{ArrowRight,Calculator,Copy,FileText,PackageSearch,Printer,Ruler,Snowflake,Sprout}from'lucide-react';")
          s=s.replace("frost:{icon:Frost", "frost:{icon:Snowflake")
          s=s.replace("seeds:{icon:Seedling", "seeds:{icon:Sprout")
          p.write_text(s)
          PY
      - name: Commit compatibility fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ToolUtilities.jsx
          git commit -m "Use supported Tool Shed utility icons"
          git push origin HEAD:main
