name: Phase 4.8.3 Route Ownership Fix

on:
  push:
    branches: [phase-4-8-3-first-time-clarity]
    paths: [.github/workflows/phase483-route-fix.yml]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-4-8-3-first-time-clarity
      - name: Correct Phase 4.8.3 parent navigation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          replacements={
            'src/App.jsx':[
              ("parentFallbacks={chores:'center','plan-plant':'center',weather:'today',vacation:'tools','shopping-list':'tools',memory:'tools'}","parentFallbacks={chores:'center','plan-plant':'center',weather:'tools',vacation:'center','shopping-list':'center',memory:'garden'}"),
              ("parentMap={weather:'today',chores:'center',vacation:'tools','plan-plant':'center','shopping-list':'tools','seed-tools':'center',indoor:'center',memory:'tools'","parentMap={weather:'tools',chores:'center',vacation:'center','plan-plant':'center','shopping-list':'center','seed-tools':'center',indoor:'center',memory:'garden'")
            ],
            'src/GardenShoppingList.jsx':[("onBack={()=>navigate('tools')} backLabel=\"Back to Tool Shed\"","onBack={()=>navigate('center')} backLabel=\"Back to Plan\"")],
            'src/VacationMode.jsx':[("onBack={()=>navigate('tools')} backLabel=\"Back to Tool Shed\"","onBack={()=>navigate('center')} backLabel=\"Back to Plan\"")],
            'src/GardenMemory.jsx':[("onBack={()=>navigate('tools')} backLabel=\"Back to Tool Shed\"","onBack={()=>navigate('garden')} backLabel=\"Back to Garden\"")]
          }
          for filename,pairs in replacements.items():
            path=Path(filename); text=path.read_text()
            for old,new in pairs:
              if old not in text: raise SystemExit(f'missing expected route text in {filename}: {old}')
              text=text.replace(old,new,1)
            path.write_text(text)
          PY
      - name: Commit route ownership correction
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/App.jsx src/GardenShoppingList.jsx src/VacationMode.jsx src/GardenMemory.jsx
          git commit -m "fix: align Phase 4.8.3 back navigation ownership"
          git push origin HEAD:phase-4-8-3-first-time-clarity
