name: Apply Tool Shed Routes

on:
  push:
    branches: [apply-tool-routes]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Patch App routes without replacing existing systems
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('src/App.jsx')
          s=p.read_text()
          s=s.replace("import ToolShed from'./ToolShed.jsx';", "import ToolShed from'./ToolShed.jsx';\nimport ToolUtility from'./ToolUtilities.jsx';")
          s=s.replace("settings:'profile','tool-shed':'tools'", "settings:'more',profile:'more','garden-settings':'more','tool-shed':'tools'")
          needle=")),manageSpace=(action,id)=>"
          insert=")),saveSpaceNote=(id,note)=>{setGarden(current=>({...current,spaces:current.spaces.map(space=>space.id===id?touchRecord({...space,notes:[space.notes,note].filter(Boolean).join('\\n')},actor):space)}));showToast('Spacing note saved to the Growing Space.')},manageSpace=(action,id)=>"
          if needle not in s: raise SystemExit('saveSpace insertion point not found')
          s=s.replace(needle,insert,1)
          old="parentMap={chores:'center','plan-plant':'center','shopping-list':'center','seed-tools':'center',indoor:'center',memory:'center',labels:'tools','seed-labels':'tools',profile:'more'"
          new="parentMap={chores:'center','plan-plant':'center','shopping-list':'center','seed-tools':'center',indoor:'center',memory:'center',labels:'tools','seed-labels':'tools','spacing-calculator':'tools','soil-calculator':'tools','frost-calculator':'tools','seed-quantity-calculator':'tools','garden-measurements':'tools','printable-pack':'tools',profile:'more'"
          if old not in s: raise SystemExit('parent map insertion point not found')
          s=s.replace(old,new,1)
          s=s.replace("{page==='center'&&<GardenCenter garden={garden} navigate={navigate}/>} ", "{page==='center'&&<GardenCenter garden={garden} navigate={navigate} tasks={boardTasks} dailyDone={daily.done}/>} ")
          s=s.replace("{page==='tools'&&<ToolShed navigate={navigate}/>} {page==='more'", "{page==='tools'&&<ToolShed navigate={navigate}/>} {page==='spacing-calculator'&&<ToolUtility mode=\"spacing\" garden={garden} navigate={navigate} onSaveSpaceNote={saveSpaceNote}/>} {page==='soil-calculator'&&<ToolUtility mode=\"soil\" garden={garden} navigate={navigate}/>} {page==='frost-calculator'&&<ToolUtility mode=\"frost\" garden={garden} navigate={navigate}/>} {page==='seed-quantity-calculator'&&<ToolUtility mode=\"seeds\" garden={garden} navigate={navigate}/>} {page==='garden-measurements'&&<ToolUtility mode=\"measurements\" garden={garden} navigate={navigate}/>} {page==='printable-pack'&&<ToolUtility mode=\"print\" garden={garden} navigate={navigate}/>} {page==='more'")
          s=s.replace("{page==='profile'&&<AdminScreen mode=\"overview\" garden={garden} navigate={navigate} onUpdateProfile={updateProfile}/>} ", "{page==='profile'&&<MoreHub garden={garden} navigate={navigate}/>} ")
          p.write_text(s)
          PY
      - name: Commit route integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.jsx
          git commit -m "Wire Tool Shed calculators and focused routes"
          git push origin HEAD:main
