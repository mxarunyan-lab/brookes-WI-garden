name: Apply Phase 4.7.8 urgent Home update

on:
  push:
    branches:
      - phase-4-7-8-urgent-home
    paths:
      - .github/workflows/apply-phase-4-7-8-urgent-home.yml

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-4-7-8-urgent-home
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Implement urgent-only Home and alert overlay
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import json
          import re

          Path('src/urgentGardenAlerts.js').write_text(r'''const NON_URGENT_KINDS=new Set(['setup','setupPlant','seasonalGuide','navigate']);
          const NON_URGENT_IDS=/^(setup-|fall-planting-review|garlic-fall-window|winter-plan-review|early-seed-start-review)/i;
          const NON_URGENT_TEXT=/(add what is actually growing|add (your|a) first plant|match .+ to a crop|choose fall planting|fall planting opportunities|review the next garden season|check early indoor seed-starting|explore|complete (your )?setup|garden profile)/i;
          const WEATHER_DANGER=/(frost|freeze|heat|storm|tornado|wind|hail|flood|heavy rain|drainage|overheat|severe weather)/i;
          const PLANT_DANGER=/(disease|pest|damage|protect|emergency|wilting|water now|drying|transplant stress|hardening delay)/i;

          const localDateKey=value=>{
           if(typeof value==='string'&&/^\d{4}-\d{2}-\d{2}/.test(value))return value.slice(0,10);
           const date=value instanceof Date?value:new Date(value||Date.now());
           if(Number.isNaN(date.getTime()))return new Date().toISOString().slice(0,10);
           return`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
          };

          export function isUrgentGardenItem(item,{today=new Date()}={}){
           if(!item||item.informational)return false;
           const kind=String(item.kind||''),id=String(item.id||''),text=[item.title,item.subtitle,item.reason,item.taskType,item.action].filter(Boolean).join(' ');
           if(NON_URGENT_KINDS.has(kind)||NON_URGENT_IDS.test(id)||NON_URGENT_TEXT.test(text))return false;
           if(item.dueDate&&localDateKey(item.dueDate)>localDateKey(today))return false;
           const priority=Number(item.priority||0),label=String(item.priorityLabel||item.severity||'').toLowerCase();
           const explicit=item.urgent===true||item.requiresImmediateAction===true||label==='urgent';
           if(kind==='weather')return explicit||priority>=90||WEATHER_DANGER.test(text)&&priority>=85;
           if(kind==='greenhouse')return explicit||priority>=90;
           if(kind==='soil')return explicit||priority>=90&&/(water|moisture|dry)/i.test(text);
           if(kind==='manual')return explicit||priority>=90;
           if(['problem','issue','plantProblem','plant-health'].includes(kind))return explicit||priority>=85;
           if(kind==='plantDetail'&&priority>=90&&(item.weatherAdjusted||WEATHER_DANGER.test(text)||PLANT_DANGER.test(text)))return true;
           return explicit&&priority>=80;
          }

          export function getUrgentGardenAlerts(items=[],options={}){
           const unique=new Map();
           for(const item of items||[]){
            if(!isUrgentGardenItem(item,options))continue;
            const key=item.id||`${item.kind||'alert'}:${item.title||''}`;
            const current=unique.get(key);
            if(!current||Number(item.priority||0)>Number(current.priority||0))unique.set(key,item);
           }
           return[...unique.values()].sort((a,b)=>Number(b.priority||0)-Number(a.priority||0)||String(a.dueDate||'').localeCompare(String(b.dueDate||''))||String(a.title||'').localeCompare(String(b.title||'')));
          }

          export function formatUrgentBadge(count){const value=Math.max(0,Number(count)||0);return value===0?null:value>9?'9+':String(value)}
          export function isGardenSetupIncomplete(garden){return!(garden?.plants||[]).some(plant=>!plant?.deletedAt&&!plant?.archived&&!['finished','removed','failed'].includes(String(plant?.stage||'').toLowerCase()))}
          export function getSetupTask(items=[]){return(items||[]).find(item=>['setup','setupPlant'].includes(item?.kind)||NON_URGENT_IDS.test(String(item?.id||'')))||null}
          export function getSeasonalIdea(items=[]){return(items||[]).find(item=>item?.kind==='seasonalGuide'||item?.kind==='navigate'&&/(season|plant|seed|garlic|fall|winter)/i.test([item.title,item.subtitle,item.reason].filter(Boolean).join(' ')))||null}
          ''')

          Path('src/UrgentHome.jsx').write_text(r'''import React,{useEffect,useId,useRef}from'react';
          import{CheckCircle2,ChevronRight,X}from'lucide-react';
          import{createPortal}from'react-dom';
          import{formatUrgentBadge,isGardenSetupIncomplete}from'./urgentGardenAlerts.js';

          export function WateringCanIcon({size=26}){return <svg className="watering-can-icon" width={size} height={size} viewBox="0 0 32 32" fill="none" aria-hidden="true"><path d="M11 11.5h12.5v13H11z" stroke="currentColor" strokeWidth="2.2" strokeLinejoin="round"/><path d="M23.5 14h2.2c2.4 0 4.3 1.9 4.3 4.3s-1.9 4.3-4.3 4.3h-2.2" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/><path d="M11 14.5 4.2 11 2 14.2l9 5" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/><path d="M15.5 11.5V9.7c0-2.3 1.9-4.2 4.2-4.2s4.2 1.9 4.2 4.2v1.8" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/><path d="M13.5 24.5h8" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/></svg>}

          const focusableSelector='button:not([disabled]),a[href],input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])';

          export function UrgentAlertControl({open,setOpen,alerts=[],onOpenTask,navigate}){
           const triggerRef=useRef(null),dialogRef=useRef(null),titleId=useId(),count=alerts.length,badge=formatUrgentBadge(count);
           const close=()=>setOpen(false);
           useEffect(()=>{
            if(!open)return undefined;
            const previousOverflow=document.body.style.overflow,previousActive=document.activeElement;
            document.body.style.overflow='hidden';
            requestAnimationFrame(()=>dialogRef.current?.querySelector(focusableSelector)?.focus());
            const onKeyDown=event=>{
             if(event.key==='Escape'){event.preventDefault();close();return}
             if(event.key!=='Tab'||!dialogRef.current)return;
             const controls=[...dialogRef.current.querySelectorAll(focusableSelector)].filter(element=>!element.hasAttribute('disabled'));
             if(!controls.length){event.preventDefault();return}
             const first=controls[0],last=controls[controls.length-1];
             if(event.shiftKey&&document.activeElement===first){event.preventDefault();last.focus()}
             else if(!event.shiftKey&&document.activeElement===last){event.preventDefault();first.focus()}
            };
            document.addEventListener('keydown',onKeyDown);
            return()=>{
             document.removeEventListener('keydown',onKeyDown);
             document.body.style.overflow=previousOverflow;
             const target=triggerRef.current||previousActive;
             requestAnimationFrame(()=>target?.focus?.());
            };
           },[open]);
           const label=count?`Urgent garden alerts. ${count} urgent item${count===1?'':'s'}.`:'Urgent garden alerts. Nothing urgent.';
           const dialog=open&&typeof document!=='undefined'?createPortal(<div className="urgent-alert-overlay" onMouseDown={event=>{if(event.target===event.currentTarget)close()}}><section ref={dialogRef} className="urgent-alert-dialog" role="dialog" aria-modal="true" aria-labelledby={titleId}><header><span><small>GARDEN CHECK</small><h2 id={titleId}>Urgent Garden Alerts</h2></span><button type="button" className="urgent-alert-close" onClick={close} aria-label="Close urgent garden alerts"><X/></button></header>{count?<><p className="urgent-alert-summary">Only time-sensitive items that could harm the garden are shown here.</p><div className="urgent-alert-list">{alerts.map(alert=><button type="button" key={alert.id||alert.title} onClick={()=>{close();onOpenTask(alert)}}><span><small>{alert.taskType||alert.weatherAlert?.type||'URGENT'}</small><strong>{alert.title||alert.weatherAlert?.what||'Garden action needed'}</strong><em>{alert.subtitle||alert.reason||alert.weatherAlert?.why||'Open for the urgent action details.'}</em></span><ChevronRight/></button>)}</div><button type="button" className="urgent-alert-board-link" onClick={()=>{close();navigate('chores')}}>Open Chore Board <ChevronRight/></button></>:<div className="urgent-alert-empty"><CheckCircle2/><span><strong>Nothing urgent right now</strong><p>Your garden does not need immediate attention.</p></span></div>}</section></div>,document.body):null;
           return <><button ref={triggerRef} type="button" className="round-control hero-bell urgent-garden-trigger" onClick={()=>setOpen(value=>!value)} aria-label={label} aria-expanded={open} aria-controls={open?'urgent-garden-alert-dialog':undefined}><WateringCanIcon/>{badge&&<span className="notification-count">{badge}</span>}</button>{dialog}</>;
          }

          const firstName=value=>String(value||'Gardener').trim().split(/\s+/)[0]||'Gardener';

          export function SimplifiedTodayCard({profile,garden,urgentAlerts=[],setupTask,onTask,navigate,onOpenAlerts}){
           const setup=isGardenSetupIncomplete(garden),primary=urgentAlerts[0];
           if(setup)return <section className="what-matters-today today-summary-card is-onboarding" aria-labelledby="what-matters-today-title"><div className="today-summary-copy"><small>TODAY</small><h2 id="what-matters-today-title">Welcome to {firstName(profile?.gardenerName)}’s Garden</h2><p>Add what you’re growing so Garden Compass can give you useful, plant-specific guidance.</p></div><div className="today-summary-actions"><button type="button" className="home-primary-route" onClick={()=>setupTask?onTask(setupTask):navigate('center')}>Add What I’m Growing <ChevronRight/></button><button type="button" className="today-secondary-link" onClick={()=>navigate('center')}>Explore the Garden Center</button></div></section>;
           if(primary)return <section className="what-matters-today today-summary-card has-urgent-action" aria-labelledby="what-matters-today-title"><div className="today-summary-copy"><small>TODAY</small><h2 id="what-matters-today-title">{primary.title||'One garden action needs attention now'}</h2><p>{primary.subtitle||primary.reason||'Open the urgent alert for the action details.'}</p></div><button type="button" className="home-primary-route" onClick={onOpenAlerts}>View Urgent Alerts <ChevronRight/></button></section>;
           return <section className="what-matters-today today-summary-card is-clear" aria-labelledby="what-matters-today-title"><div className="today-clear-message"><CheckCircle2/><span><small>TODAY</small><h2 id="what-matters-today-title">Everything looks good today</h2><p>No urgent garden actions right now.</p></span></div></section>;
          }

          export function SeasonalIdeaCard({task,onOpen}){if(!task)return null;return <section className="seasonal-idea-card"><span><small>SEASONAL IDEA</small><strong>{task.title}</strong><p>{task.subtitle||task.reason||'Open this optional seasonal garden idea.'}</p></span><button type="button" onClick={()=>onOpen(task)}>{task.action||'See Options'} <ChevronRight/></button></section>}
          ''')

          workspace=Path('src/WorkspaceScreens.jsx')
          source=workspace.read_text()
          source=source.replace(',Bell,',',').replace("import{buildGardenIntelligenceEngine}from'./gardenIntelligenceEngine.js';\n",'')
          source=source.replace("import{buildTaskBoard}from'./taskBoard.js';", "import{buildTaskBoard}from'./taskBoard.js';\nimport{SimplifiedTodayCard,SeasonalIdeaCard,UrgentAlertControl}from'./UrgentHome.jsx';\nimport{getSeasonalIdea,getSetupTask,getUrgentGardenAlerts}from'./urgentGardenAlerts.js';")
          source,count=re.subn(r"\nfunction WhatMattersToday\([\s\S]*?\n\nexport function TodayWorkspace", "\n\nexport function TodayWorkspace", source, count=1)
          assert count==1,'Could not remove the old Garden Status component'
          replacement=r'''export function TodayWorkspace({profile,garden,tasks,dailyDone,noticeOpen,setNoticeOpen,weatherState,weatherAlert,weatherGuidance,activity,navigate,onTask,tomorrowTasks=[]}){
           const board=buildTaskBoard({tasks,completions:dailyDone}),urgentAlerts=getUrgentGardenAlerts(board.needsAttention),setupTask=getSetupTask(tasks),seasonalIdea=getSeasonalIdea(tasks),last=(activity||[]).slice(0,1),openGardenWeather=()=>{try{sessionStorage.setItem(WEATHER_MODE_KEY,'garden')}catch{}navigate('weather')};
           /* Header control styling remains hero-bell; its urgent badge remains notification-count. The compact card remains what-matters-today for layout continuity. */
           return <main className="screen today-screen"><section className="today-hero compact-home-hero"><UrgentAlertControl open={noticeOpen} setOpen={setNoticeOpen} alerts={urgentAlerts} onOpenTask={onTask} navigate={navigate}/><div className="hero-title-wrap compact-hero-title"><Leaf/><div><h1>{profile.gardenerName||'Brooke'}’s Garden</h1><p>{profile.gardenName||'The Runyan Garden'} — {String(profile.location||'Green Bay').replace(/\s+54302$/,'').replace(/,\s*Wisconsin$/,'')}</p></div></div><WisconsinLandscape/></section><section className="today-body compact-today-body screen-pad"><SimplifiedTodayCard profile={profile} garden={garden} urgentAlerts={urgentAlerts} setupTask={setupTask} onTask={onTask} navigate={navigate} onOpenAlerts={()=>setNoticeOpen(true)}/><WeatherLine {...weatherState} alert={weatherAlert} guidance={weatherGuidance} onOpenWeather={openGardenWeather}/><SeasonalIdeaCard task={seasonalIdea} onOpen={onTask}/>{last.length>0&&<details className="compact-handoff collapsible-handoff"><summary><span><small>LATEST HANDOFF</small><strong>What already happened</strong></span><ChevronDown/></summary>{last.map(entry=><article key={entry.id}><Check/><span><strong>{entry.actor?`${entry.actor}: `:''}{entry.title}</strong><small>{entry.detail}</small></span><em>{formatDateTime(entry.at)}</em></article>)}<button className="text-link" onClick={()=>navigate('chores')}>See completed work <ChevronRight/></button></details>}</section></main>}

function WeatherToolTabs'''
          source,count=re.subn(r"export function TodayWorkspace\([\s\S]*?\n\nfunction WeatherToolTabs",replacement,source,count=1)
          assert count==1,'Could not replace TodayWorkspace'
          assert '<Bell/>' not in source
          assert 'GARDEN STATUS' not in source
          workspace.write_text(source)

          Path('src/styles/phase-4-7-8-urgent-home.css').write_text(r'''/* Phase 4.7.8: urgent-only Home hierarchy. The approved seasonal header geometry and artwork remain locked. */
          .urgent-garden-trigger .watering-can-icon{width:27px;height:27px;display:block;color:inherit;stroke:currentColor}
          .today-summary-card{display:grid!important;gap:13px!important;padding:18px!important;background:#fffaf0!important;border:1px solid #d8cdb9!important;color:#173d2b!important;box-shadow:0 8px 20px rgba(6,60,39,.1)!important}
          .today-summary-copy{display:grid;gap:5px}
          .today-summary-copy>small,.today-clear-message small,.seasonal-idea-card small{font-size:.68rem;font-weight:900;letter-spacing:.12em;color:#80611b}
          .today-summary-copy h2,.today-clear-message h2{margin:0;font-family:'Fraunces',Georgia,serif;font-size:clamp(1.38rem,6vw,1.82rem);line-height:1.08;color:#173d2b}
          .today-summary-copy p,.today-clear-message p,.seasonal-idea-card p{margin:0;color:#5b685f;font-size:.9rem;line-height:1.42}
          .today-summary-actions{display:grid;gap:7px}
          .today-summary-card .home-primary-route{width:100%;min-height:48px;margin:0!important;padding:10px 14px;border:0;border-radius:13px;display:flex;align-items:center;justify-content:center;gap:7px;background:#184a34!important;color:#fff!important;font-size:.95rem;font-weight:850}
          .today-summary-card .home-primary-route svg{width:19px;height:19px}
          .today-secondary-link{min-height:40px;border:0;background:transparent;color:#245d43;font-weight:800;text-decoration:underline;text-underline-offset:3px}
          .today-summary-card.is-clear{background:#eef4e9!important;border-color:#cbd9c6!important}
          .today-summary-card.has-urgent-action{border-color:#d7a59b!important;background:#fff8f2!important}
          .today-clear-message{display:grid!important;grid-template-columns:36px minmax(0,1fr)!important;gap:11px!important;align-items:center!important;padding:0!important}
          .today-clear-message>svg{width:34px!important;height:34px!important;color:#2c724b!important}
          .today-clear-message>span{display:grid!important;gap:4px!important}
          .seasonal-idea-card{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;padding:15px;border:1px solid #e4d3a6;border-radius:17px;background:#fff6d9;color:#173d2b;box-shadow:0 5px 15px rgba(6,60,39,.06)}
          .seasonal-idea-card>span{display:grid;gap:4px;min-width:0}
          .seasonal-idea-card strong{font-family:'Fraunces',Georgia,serif;font-size:1.06rem;line-height:1.15}
          .seasonal-idea-card button{min-height:42px;padding:8px 10px;border:0;border-radius:11px;display:flex;align-items:center;gap:4px;background:#f0c75b;color:#173d2b;font-size:.76rem;font-weight:850;white-space:nowrap}
          .seasonal-idea-card button svg{width:16px;height:16px}

          .urgent-alert-overlay{position:fixed;inset:0;z-index:5000;display:grid;align-items:start;justify-items:end;padding:max(68px,calc(env(safe-area-inset-top) + 58px)) max(12px,env(safe-area-inset-right)) max(14px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));background:rgba(5,35,23,.52);overscroll-behavior:contain}
          .urgent-alert-dialog{position:relative;z-index:5001;width:min(390px,calc(100vw - max(24px,env(safe-area-inset-left) + env(safe-area-inset-right))));max-height:calc(100dvh - max(96px,calc(env(safe-area-inset-top) + 76px)));overflow-x:hidden;overflow-y:auto;overscroll-behavior:contain;border:1px solid #d5c8b3;border-radius:20px;padding:16px;background:#fffaf0;color:#173d2b;box-shadow:0 22px 60px rgba(0,0,0,.34)}
          .urgent-alert-dialog>header{display:grid;grid-template-columns:minmax(0,1fr) 42px;gap:10px;align-items:start;padding-bottom:12px;border-bottom:1px solid #e7ddcd}
          .urgent-alert-dialog>header>span{display:grid;gap:2px}
          .urgent-alert-dialog>header small{font-size:.67rem;font-weight:900;letter-spacing:.12em;color:#8a6418}
          .urgent-alert-dialog h2{margin:0;font-family:'Fraunces',Georgia,serif;font-size:1.55rem;line-height:1.1}
          .urgent-alert-close{width:42px;height:42px;border:0;border-radius:50%;display:grid;place-items:center;background:#e8efe5;color:#173d2b}
          .urgent-alert-close svg{width:21px;height:21px}
          .urgent-alert-summary{margin:12px 0;color:#5b685f;font-size:.82rem;line-height:1.4}
          .urgent-alert-list{display:grid;gap:8px}
          .urgent-alert-list>button{width:100%;min-height:74px;padding:12px;border:1px solid #e2d7c6;border-radius:14px;display:grid;grid-template-columns:minmax(0,1fr) 20px;gap:8px;align-items:center;text-align:left;background:#fff;color:#173d2b}
          .urgent-alert-list>button>span{display:grid;gap:3px;min-width:0}
          .urgent-alert-list small{font-size:.64rem;font-weight:900;letter-spacing:.1em;color:#9a3e31}
          .urgent-alert-list strong{font-size:.98rem;line-height:1.18}
          .urgent-alert-list em{font-style:normal;color:#5b685f;font-size:.78rem;line-height:1.35}
          .urgent-alert-list svg{width:18px;height:18px}
          .urgent-alert-board-link{width:100%;min-height:46px;margin-top:10px;border:0;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:6px;background:#184a34;color:#fff;font-weight:850}
          .urgent-alert-empty{display:grid;grid-template-columns:42px minmax(0,1fr);gap:11px;align-items:center;padding:22px 2px 12px}
          .urgent-alert-empty>svg{width:38px;height:38px;color:#2c724b}
          .urgent-alert-empty>span{display:grid;gap:4px}
          .urgent-alert-empty strong{font-family:'Fraunces',Georgia,serif;font-size:1.14rem}
          .urgent-alert-empty p{margin:0;color:#5b685f;font-size:.84rem;line-height:1.4}
          .urgent-alert-dialog button:focus-visible,.urgent-garden-trigger:focus-visible,.today-summary-card button:focus-visible,.seasonal-idea-card button:focus-visible{outline:3px solid #f0c75b;outline-offset:3px}

          @media(max-width:430px){
           .urgent-alert-overlay{align-items:start;padding-top:max(60px,calc(env(safe-area-inset-top) + 52px))}
           .urgent-alert-dialog{width:100%;max-height:calc(100dvh - max(80px,calc(env(safe-area-inset-top) + 66px)));border-radius:18px;padding:14px}
           .seasonal-idea-card{grid-template-columns:1fr}
           .seasonal-idea-card button{justify-self:start}
          }
          @media(max-width:350px){
           .today-summary-card{padding:15px!important}
           .today-summary-copy h2,.today-clear-message h2{font-size:1.3rem}
           .urgent-alert-overlay{padding-left:8px;padding-right:8px}
          }
          ''')

          main=Path('src/main.jsx')
          main_text=main.read_text()
          marker="import './styles/phase-4-7-6-seasonal-header.css';"
          assert marker in main_text
          if "phase-4-7-8-urgent-home.css" not in main_text:
           main_text=main_text.replace(marker,marker+"\nimport './styles/phase-4-7-8-urgent-home.css';")
          main.write_text(main_text)

          Path('test/urgentHomeAlerts.test.js').write_text(r'''import test from'node:test';
          import assert from'node:assert/strict';
          import{readFile}from'node:fs/promises';
          import{formatUrgentBadge,getSeasonalIdea,getSetupTask,getUrgentGardenAlerts,isGardenSetupIncomplete,isUrgentGardenItem}from'../src/urgentGardenAlerts.js';

          const due='2026-07-23';
          test('setup, onboarding, and optional seasonal ideas never become urgent alerts',()=>{
           const rows=[
            {id:'setup-first-plant',kind:'setupPlant',priority:99,priorityLabel:'Urgent',dueDate:due,title:'Add what is actually growing'},
            {id:'fall-planting-review',kind:'seasonalGuide',priority:99,dueDate:due,title:'Choose fall planting opportunities'},
            {id:'winter-plan-review',kind:'navigate',priority:99,dueDate:due,title:'Review the next garden season'},
            {id:'identify-1',kind:'plantDetail',priority:94,dueDate:due,title:'Match mystery plant to a crop'}
           ];
           assert.deepEqual(getUrgentGardenAlerts(rows,{today:new Date(`${due}T12:00:00`)}),[]);
          });

          test('only explicit time-sensitive garden danger reaches the urgent alert list',()=>{
           const rows=[
            {id:'weather-freeze',kind:'weather',priority:96,dueDate:due,title:'Protect tender plants from a freeze'},
            {id:'greenhouse-hot',kind:'greenhouse',priority:94,dueDate:due,title:'Ventilate the greenhouse'},
            {id:'water-now',kind:'soil',taskType:'Water',priority:92,dueDate:due,title:'Water tomato now'},
            {id:'manual-urgent',kind:'manual',priority:90,priorityLabel:'Urgent',dueDate:due,title:'Cover the new transplants'},
            {id:'harvest',kind:'plantDetail',priority:96,dueDate:due,title:'Check tomatoes for harvest'},
            {id:'future-storm',kind:'weather',priority:99,dueDate:'2026-07-30',title:'Prepare for storm'}
           ];
           const urgent=getUrgentGardenAlerts(rows,{today:new Date(`${due}T12:00:00`)});
           assert.deepEqual(urgent.map(row=>row.id),['weather-freeze','greenhouse-hot','water-now','manual-urgent']);
           assert.equal(isUrgentGardenItem(rows[4],{today:new Date(`${due}T12:00:00`)}),false);
          });

          test('urgent badges are absent at zero and cap at 9+',()=>{
           assert.equal(formatUrgentBadge(0),null);
           assert.equal(formatUrgentBadge(1),'1');
           assert.equal(formatUrgentBadge(9),'9');
           assert.equal(formatUrgentBadge(10),'9+');
          });

          test('setup and seasonal helpers keep calm Home content separate',()=>{
           const setup={id:'setup-first-plant',kind:'setupPlant'},seasonal={id:'fall-planting-review',kind:'seasonalGuide'};
           assert.equal(getSetupTask([seasonal,setup]),setup);
           assert.equal(getSeasonalIdea([setup,seasonal]),seasonal);
           assert.equal(isGardenSetupIncomplete({plants:[]}),true);
           assert.equal(isGardenSetupIncomplete({plants:[{id:'plant-1',stage:'Established'}]}),false);
          });

          test('Home source uses a watering can, top-level portal dialog, and no Garden Status alarm card',async()=>{
           const[home,workspace,css]=await Promise.all([
            readFile(new URL('../src/UrgentHome.jsx',import.meta.url),'utf8'),
            readFile(new URL('../src/WorkspaceScreens.jsx',import.meta.url),'utf8'),
            readFile(new URL('../src/styles/phase-4-7-8-urgent-home.css',import.meta.url),'utf8')
           ]);
           assert.match(home,/WateringCanIcon/);
           assert.match(home,/createPortal/);
           assert.match(home,/role="dialog"/);
           assert.match(home,/aria-modal="true"/);
           assert.match(home,/document\.body\.style\.overflow='hidden'/);
           assert.match(home,/Nothing urgent right now/);
           assert.doesNotMatch(workspace,/<Bell\/>/);
           assert.doesNotMatch(workspace,/GARDEN STATUS/);
           assert.ok(workspace.indexOf('SimplifiedTodayCard')<workspace.indexOf('<WeatherLine'));
           assert.match(css,/\.urgent-alert-overlay\{position:fixed/);
           assert.match(css,/z-index:5000/);
           assert.match(css,/100dvh/);
           assert.match(css,/safe-area-inset-top/);
          });
          ''')

          # Release metadata and cache/version changes.
          package=json.loads(Path('package.json').read_text())
          package['version']='0.20.6'
          Path('package.json').write_text(json.dumps(package,indent=2)+"\n")
          lock_path=Path('package-lock.json')
          if lock_path.exists():
           lock=json.loads(lock_path.read_text())
           lock['version']='0.20.6'
           if '' in lock.get('packages',{}):lock['packages']['']['version']='0.20.6'
           lock_path.write_text(json.dumps(lock,indent=2)+"\n")

          # Update exact release references in text source and tests without touching the approved image query/version.
          for root in ['src','server','test','tests','scripts','.github']:
           base=Path(root)
           if not base.exists():continue
           for path in base.rglob('*'):
            if not path.is_file() or path.suffix not in {'.js','.jsx','.mjs','.yml','.yaml','.json','.css'}:continue
            if path.name=='apply-phase-4-7-8-urgent-home.yml':continue
            try:text=path.read_text()
            except UnicodeDecodeError:continue
            updated=text.replace('phase-4-7-7-exact-seasonal-header','phase-4-7-8-urgent-only-home').replace("'0.20.5'","'0.20.6'").replace('"0.20.5"','"0.20.6"')
            if updated!=text:path.write_text(updated)

          render=Path('render.yaml')
          render.write_text(render.read_text().replace('value: 0.20.5','value: 0.20.6'))
          sw=Path('public/sw.js')
          sw.write_text(sw.read_text().replace('brookes-garden-v0477-exact-seasonal-header-20260722','brookes-garden-v0478-urgent-only-home-20260723'))

          Path('src/version.js').write_text(r'''export const APP_VERSION='0.20.6';
          export const BUILD_ID='phase-4-7-8-urgent-only-home';
          export const UPDATED_AT='July 23, 2026';
          export const WHATS_NEW=[
           'Today still shows the approved seasonal garden picture at its exact 2:1 composition without cropping or stretching',
           'Seasonal headers remain stable WebP images so iPhone Safari no longer displays AVIF corruption',
           'The duplicate live title panel remains visually removed because the approved artwork already contains the exact Archie’s Garden identity panel',
           'The header bell is now a friendly watering can while its size, position, artwork, and seasonal layout remain unchanged',
           'The large Garden Status alarm card is replaced by one calm Today card, and setup or seasonal ideas no longer create urgent badges',
           'Urgent Garden Alerts now opens in a top-level accessible overlay above Today, weather, and bottom navigation',
           'Garden Center remains locked to the five core garden-management destinations',
           'Tool Shed remains a flat one-tap directory with Calculators & Utilities, Weather & Timing, and Records & Extras'
          ];
          ''')

          # Refresh the live verifier while preserving the navigation and exact-header certification.
          verifier=Path('scripts/verifyPhase475Live.mjs')
          verifier.write_text(r'''import assert from'node:assert/strict';
          import{chromium}from'playwright';

          const base=(process.env.APP_URL||'https://brookes-garden-compass.onrender.com').replace(/\/$/,'');
          const expectedBuild='phase-4-7-8-urgent-only-home';
          const attempts=Number(process.env.VERIFY_ATTEMPTS||48),delay=Number(process.env.VERIFY_DELAY_MS||10000);
          const sleep=ms=>new Promise(resolve=>setTimeout(resolve,ms));
          const fetchText=async url=>{const response=await fetch(url,{cache:'no-store'});assert.equal(response.status,200,`${url} returned ${response.status}`);return response.text()};
          const currentGreenBaySeason=()=>{const month=Number(new Intl.DateTimeFormat('en-US',{timeZone:'America/Chicago',month:'numeric'}).format(new Date()));if(month>=3&&month<=5)return'spring';if(month>=6&&month<=8)return'summer';if(month>=9&&month<=11)return'fall';return'winter'};
          let result=null,lastError=null;
          for(let attempt=1;attempt<=attempts;attempt+=1){
           let browser;
           try{
            const healthResponse=await fetch(`${base}/api/health`,{headers:{accept:'application/json'},cache:'no-store'});
            assert.equal(healthResponse.status,200,`Health endpoint returned ${healthResponse.status}`);
            const health=await healthResponse.json();
            assert.equal(health.ok,true);
            assert.equal(health.version,'0.20.6');
            const html=await fetchText(`${base}/`);
            const scriptPaths=[...html.matchAll(/<script[^>]+src="([^"]+\.js)"/g)].map(match=>match[1]);
            const stylePaths=[...html.matchAll(/<link[^>]+href="([^"]+\.css)"/g)].map(match=>match[1]);
            assert.ok(scriptPaths.length,'Live JavaScript asset was not found.');
            assert.ok(stylePaths.length,'Live CSS asset was not found.');
            const js=(await Promise.all(scriptPaths.map(path=>fetchText(new URL(path,`${base}/`).toString())))).join('\n');
            const css=(await Promise.all(stylePaths.map(path=>fetchText(new URL(path,`${base}/`).toString())))).join('\n');
            assert.match(js,new RegExp(expectedBuild));
            assert.match(js,/Urgent Garden Alerts/);
            assert.match(js,/Nothing urgent right now/);
            assert.match(js,/watering-can-icon/);
            assert.match(js,/CALCULATORS & UTILITIES/);
            assert.match(js,/WEATHER & TIMING/);
            assert.match(js,/RECORDS & EXTRAS/);
            assert.match(css,/garden-header-summer\.webp\?v=0477/);
            assert.match(css,/aspect-ratio:2\/1/);
            assert.match(css,/background-size:contain/);
            assert.match(css,/urgent-alert-overlay/);
            assert.match(css,/z-index:5000/);
            assert.match(css,/100dvh/);
            assert.match(css,/compact-secondary-header/);
            assert.match(css,/tool-shed-directory-card/);
            assert.match(css,/garden-center-tile/);
            const liveSeason=currentGreenBaySeason(),seasonalAsset=`/images/garden-headers/garden-header-${liveSeason}.webp?v=0477`;
            const assetResponse=await fetch(`${base}${seasonalAsset}`,{cache:'no-store'});
            assert.equal(assetResponse.status,200,`${seasonalAsset} returned ${assetResponse.status}`);
            assert.match(assetResponse.headers.get('content-type')||'',/image\/webp/);
            assert.ok((await assetResponse.arrayBuffer()).byteLength>10000,`${seasonalAsset} is unexpectedly small`);

            browser=await chromium.launch({headless:true});
            const context=await browser.newContext({serviceWorkers:'block',viewport:{width:390,height:900},deviceScaleFactor:1});
            const page=await context.newPage();
            await page.addInitScript(()=>localStorage.setItem('runyan-garden-active-profile','archie'));
            const goto=async route=>{const response=await page.goto(`${base}/?page=${route}&phase478=${Date.now()}`,{waitUntil:'domcontentloaded'});assert.equal(response?.status(),200);await page.locator('main').waitFor()};

            await goto('today');
            const hero=page.locator('.compact-home-hero'),todayCard=page.locator('.what-matters-today'),title=page.locator('.compact-hero-title');
            await hero.waitFor();await todayCard.waitFor();
            const heroBox=await hero.boundingBox(),cardBox=await todayCard.boundingBox(),titleBox=await title.boundingBox();
            assert.ok(heroBox.height>=180&&heroBox.height<=190,`Seasonal header height was ${heroBox.height}`);
            assert.ok(Math.abs(heroBox.width/heroBox.height-2)<.03,`Seasonal header ratio was ${heroBox.width/heroBox.height}`);
            assert.ok(cardBox.y<heroBox.y+heroBox.height,'Today card does not overlap the seasonal header');
            const heroStyle=await hero.evaluate(element=>({backgroundImage:getComputedStyle(element).backgroundImage,backgroundSize:getComputedStyle(element).backgroundSize,borderRadius:getComputedStyle(element).borderRadius,afterDisplay:getComputedStyle(element,'::after').display}));
            assert.ok(heroStyle.backgroundImage.includes(`garden-header-${liveSeason}.webp`),`Expected ${liveSeason} header, received ${heroStyle.backgroundImage}`);
            assert.equal(heroStyle.backgroundSize,'contain');assert.notEqual(heroStyle.borderRadius,'0px');assert.equal(heroStyle.afterDisplay,'none');
            assert.ok(titleBox.width<=1&&titleBox.height<=1,'A duplicate live title panel is visible over the approved artwork');
            assert.equal(await page.locator('.today-quick-links').count(),0);
            assert.equal(await page.getByText('GARDEN STATUS',{exact:true}).count(),0,'Large Garden Status card returned');
            assert.equal(await page.locator('.watering-can-icon').count(),1,'Watering can trigger missing or duplicated');
            const trigger=page.getByRole('button',{name:/Urgent garden alerts/i});
            await trigger.click();
            const dialog=page.getByRole('dialog',{name:'Urgent Garden Alerts',exact:true});
            await dialog.waitFor();
            assert.equal(await page.locator('.urgent-alert-overlay').evaluate(element=>element.parentElement===document.body),true,'Alert overlay was not portaled under document.body');
            const overlayStyle=await page.locator('.urgent-alert-overlay').evaluate(element=>({position:getComputedStyle(element).position,z:Number(getComputedStyle(element).zIndex)}));
            const cardZ=await todayCard.evaluate(element=>Number(getComputedStyle(element).zIndex)||0);
            assert.equal(overlayStyle.position,'fixed');assert.ok(overlayStyle.z>cardZ,'Alert overlay is behind Today');
            assert.equal(await page.evaluate(()=>document.body.style.overflow),'hidden');
            await page.keyboard.press('Escape');await dialog.waitFor({state:'hidden'});
            assert.equal(await page.evaluate(()=>document.body.style.overflow),'');
            assert.equal(await trigger.evaluate(element=>document.activeElement===element),true,'Focus did not return to watering can');

            for(const width of[320,375,390,430]){
             const mobile=await browser.newContext({serviceWorkers:'block',viewport:{width,height:900},deviceScaleFactor:1});
             const phone=await mobile.newPage();
             await phone.addInitScript(()=>localStorage.setItem('runyan-garden-active-profile','archie'));
             await phone.goto(`${base}/?page=today&phase478mobile=${width}-${Date.now()}`,{waitUntil:'domcontentloaded'});
             await phone.locator('.compact-home-hero').waitFor();
             assert.equal(await phone.evaluate(()=>document.documentElement.scrollWidth<=document.documentElement.clientWidth),true,`${width}px has horizontal overflow`);
             await phone.getByRole('button',{name:/Urgent garden alerts/i}).click();
             const panel=phone.locator('.urgent-alert-dialog');await panel.waitFor();
             const box=await panel.boundingBox();
             assert.ok(box.x>=0&&box.x+box.width<=width+1,`${width}px alert panel exceeds viewport`);
             const bottomNav=phone.locator('.bottom-nav');
             if(await bottomNav.count()){const panelZ=await panel.evaluate(element=>Number(getComputedStyle(element).zIndex));const navZ=await bottomNav.evaluate(element=>Number(getComputedStyle(element).zIndex)||0);assert.ok(panelZ>navZ,`${width}px alert panel is behind bottom navigation`)}
             await mobile.close();
            }

            await goto('center');
            await page.getByRole('heading',{name:'Garden Center',exact:true}).waitFor();
            assert.equal(await page.locator('.garden-center-tile').count(),5);
            const centerText=await page.locator('main').innerText();
            for(const heading of['Seed Department','Planting Desk','Growing Spaces','Indoor Growing','Garden Chore Board'])assert.ok(centerText.includes(heading),`${heading} missing live`);
            for(const heading of['Shopping List','Vacation Mode','Garden History'])assert.equal(centerText.includes(heading),false,`${heading} duplicated live on Garden Center`);
            assert.ok((await page.locator('.garden-center-hero').boundingBox()).height<160,'Live Garden Center header remains oversized');

            await goto('tools');
            await page.getByRole('heading',{name:'Tool Shed',exact:true}).waitFor();
            assert.equal(await page.locator('.tool-shed-directory-card').count(),11);
            assert.equal(await page.getByText('RECORDS & EXTRAS',{exact:true}).count(),1);
            assert.equal(await page.locator('details.tool-shed-drawer').count(),0);
            await context.close();await browser.close();browser=null;
            result={ok:true,base,attempt,health,expectedBuild,liveSeason,seasonalAsset,headerRatio:heroBox.width/heroBox.height,mobileWidths:[320,375,390,430],urgentOverlay:true,gardenCenterDestinations:5,toolShedDestinations:11};
            break;
           }catch(error){if(browser)await browser.close().catch(()=>{});lastError=error;console.error(`[Phase 4.7.8 live check ${attempt}/${attempts}] ${error.message}`);if(attempt<attempts)await sleep(delay)}
          }
          assert.ok(result,`Live Phase 4.7.8 verification failed after ${attempts} attempts: ${lastError?.stack||lastError}`);
          console.log(JSON.stringify(result,null,2));
          ''')

          # The exact approved seasonal assets and their CSS are intentionally untouched.
          assert Path('src/styles/phase-4-7-6-seasonal-header.css').exists()
          PY

      - name: Install dependencies
        run: npm ci

      - name: Run complete test suite
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Confirm seasonal artwork remains untouched
        shell: bash
        run: |
          test -f public/images/garden-headers/garden-header-spring.avif
          test -f public/images/garden-headers/garden-header-summer.avif
          test -f public/images/garden-headers/garden-header-fall.avif
          test -f public/images/garden-headers/garden-header-winter.avif
          git diff --exit-code HEAD -- public/images/garden-headers src/styles/phase-4-7-6-seasonal-header.css

      - name: Commit completed implementation
        shell: bash
        run: |
          rm .github/workflows/apply-phase-4-7-8-urgent-home.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Phase 4.7.8 urgent-only Home and watering-can alerts [skip ci]"
          git push origin HEAD:phase-4-7-8-urgent-home
