name: Apply Phase 4.6X.3 Implementation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-validated-phase:
    if: github.event.pull_request.head.ref == 'agent/phase-4-6x-3-multimodal-seed-vision'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out protected feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reconstruct implementation artifact
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          root=Path('.github/phase46x3_payload')
          order=['part00.txt','part01.txt','part020.txt','part021.txt','part03.txt','part04.txt','part05.txt','part06.txt','part07.txt','part08.txt','part09.txt','part10.txt']
          rows={name:(root/name).read_text() for name in order}
          assert rows['part05.txt'][7884]=='B'
          rows['part05.txt']=rows['part05.txt'][:7884]+'D'+rows['part05.txt'][7885:]
          assert rows['part07.txt'][741]=='t'
          rows['part07.txt']=rows['part07.txt'][:741]+'k'+rows['part07.txt'][742:]
          rows['part10.txt']=rows['part10.txt'][:4946]+'h'+rows['part10.txt'][4946:]
          Path('/tmp/phase46x3.patch.gz.b64').write_text(''.join(rows[name] for name in order))
          PY
          sha256sum /tmp/phase46x3.patch.gz.b64 > phase46x3-payload-hashes.txt
          base64 -d /tmp/phase46x3.patch.gz.b64 > /tmp/phase46x3.patch.gz
          sha256sum /tmp/phase46x3.patch.gz >> phase46x3-payload-hashes.txt
      - name: Upload integrity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-4-6x-3-integrity
          path: phase46x3-payload-hashes.txt
          retention-days: 2
      - name: Verify and apply implementation
        run: |
          set -euo pipefail
          echo '7708a6b04e38ee277ff03248910feb263a904bb5b480053249481f775a533816  /tmp/phase46x3.patch.gz' | sha256sum --check
          gzip -dc /tmp/phase46x3.patch.gz > /tmp/phase46x3.patch
          echo '5286c2323f0f903f411841856c9910f995a3759866d68316ad2eb99132720796  /tmp/phase46x3.patch' | sha256sum --check
          git am /tmp/phase46x3.patch
      - name: Install dependencies
        run: npm install
      - name: Run focused Phase 4.6X.3 tests
        run: node --test test/seedPacketIntelligence.test.js test/seedProductLookup.test.js test/seedPacketOneTapTrust.test.js test/seedPacketVisionSchema.test.js test/seedPacketVisionMerge.test.js test/seedPacketVisionApi.test.js test/seedPacketVisionMigration.test.js test/gardenPersistence.test.js test/dataReadinessStructure.test.js test/backupMigrationReadiness.test.js
      - name: Build production app
        run: npm run build
      - name: Remove temporary delivery files
        run: |
          rm -rf .github/phase46x3_payload
          rm -f .github/workflows/phase46x3-apply.yml
          git add -A
      - name: Commit clean implementation
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git diff --cached --quiet || git commit -m 'Remove Phase 4.6X.3 delivery files'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
