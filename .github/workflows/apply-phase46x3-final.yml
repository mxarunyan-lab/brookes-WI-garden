name: Apply Phase 4.6X.3 Final Patch

on:
  push:
    branches: [agent/phase-4-6x-3-multimodal-vision]

permissions:
  contents: write

jobs:
  apply-final-patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-4-6x-3-multimodal-vision
          fetch-depth: 0
      - name: Apply verified Phase 4.6X.3 patch
        run: |
          set -euo pipefail
          cat .github/phase46x3-payload/part-* > /tmp/phase463.patch
          git apply --binary --check /tmp/phase463.patch
          git apply --binary /tmp/phase463.patch
          rm -rf .github/phase46x3-payload .github/workflows/apply-phase46x3-final.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Complete Phase 4.6X.3 multimodal packet intelligence'
          git push origin HEAD:agent/phase-4-6x-3-multimodal-vision
