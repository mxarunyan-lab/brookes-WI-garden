name: Apply Phase 4.6 Implementation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-validated-phase:
    if: github.event.pull_request.head.ref == 'agent/phase-4-6-intelligence-reality-check'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out protected feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reconstruct and verify implementation patch
        run: |
          set -euo pipefail
          cat .github/phase46_patch/*.patch > /tmp/phase46.patch
          echo '1bf65ef710606e3c363f7fa2e292f932f6f414cda6e411724be53e6ed66deb2a  /tmp/phase46.patch' | sha256sum --check
          git apply --check /tmp/phase46.patch
          git apply --index /tmp/phase46.patch
      - name: Install dependencies
        run: npm install
      - name: Run targeted Phase 4.6 tests
        id: targeted_tests
        continue-on-error: true
        run: |
          node --test \
            test/connectedIntelligence.test.js \
            test/seedProductLookup.test.js \
            test/vacationPlanner.test.js \
            test/gardenPersistence.test.js \
            test/weatherDecisionEngine.test.js > phase46-tests.log 2>&1
      - name: Build production app
        id: production_build
        continue-on-error: true
        run: npm run build > phase46-build.log 2>&1
      - name: Upload Phase 4.6 check logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-4-6-apply-checks
          path: |
            phase46-tests.log
            phase46-build.log
          retention-days: 2
      - name: Stop on failed checks
        if: steps.targeted_tests.outcome == 'failure' || steps.production_build.outcome == 'failure'
        run: |
          echo '--- targeted tests ---'
          tail -200 phase46-tests.log || true
          echo '--- production build ---'
          tail -200 phase46-build.log || true
          exit 1
      - name: Remove temporary delivery files
        run: |
          rm -rf .github/phase46_patch .github/phase46_payload
          rm -f .github/workflows/phase46-export.yml .github/workflows/phase46-apply.yml
          git add -A
      - name: Commit Phase 4.6 implementation
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Implement Phase 4.6 connected intelligence'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
