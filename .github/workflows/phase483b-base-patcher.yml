name: Phase 4.8.3b Isolated Branch Patcher

on:
  pull_request_target:
    branches: [phase-4-8-3b-automation-base]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'phase-4-8-3b-restore-garden-history'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-4-8-3b-restore-garden-history
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Extract and apply corrective patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text=Path('.github/workflows/phase483b-apply.yml').read_text()
          marker="          cat > /tmp/patch.py <<'PY'\n"
          start=text.index(marker)+len(marker)
          end=text.index("\n          PY\n          python3 /tmp/patch.py",start)
          lines=text[start:end].splitlines()
          Path('/tmp/patch.py').write_text('\n'.join(line[10:] if line.startswith('          ') else line for line in lines)+'\n')
          PY
          python3 /tmp/patch.py
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Commit tested correction to feature branch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm -f .github/workflows/phase483b-apply.yml .github/workflows/phase483b-trigger.yml
          git add -A
          git commit -m "Restore Garden History entry on Garden"
          git push origin HEAD:phase-4-8-3b-restore-garden-history
