name: Verify Phase 4.7.9 Live Production

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/verify-phase-4-7-8-live.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      APP_URL: https://brookes-garden-compass.onrender.com
      VERIFY_ATTEMPTS: 48
      VERIFY_DELAY_MS: 10000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run complete test suite
        run: npm test

      - name: Build production app and all four static seasonal headers
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify Phase 4.7.9 on Render at 320, 375, 390, and 430 pixels
        run: npm run verify:phase475:live
