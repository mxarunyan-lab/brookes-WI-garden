name: Phase 4.7.4 Critical Journeys

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  critical-lifecycle-and-installed-app:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply guarded focused-run corrections
        run: |
          node scripts/applyPhase474JourneyHarnessFix.mjs
          node scripts/applyPhase474PacketHealthHarness.mjs
          node scripts/applyPhase474LabelConsistency.mjs
          node scripts/applyPhase474TodayPriority.mjs
      - run: npm run build
      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Start production server
        run: |
          PORT=4173 npm start > phase474-critical-server.log 2>&1 &
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:4173/api/health >/dev/null; then exit 0; fi
            sleep 1
          done
          cat phase474-critical-server.log
          exit 1
      - name: Critical interconnected record lifecycle
        shell: bash
        run: |
          set -o pipefail
          node scripts/verifyPhase474CriticalJourneys.mjs 2>&1 | tee phase474-critical-journeys.log
        env:
          APP_URL: http://127.0.0.1:4173
      - name: PWA, direct-route, and printable behavior
        shell: bash
        run: |
          set -o pipefail
          node scripts/verifyPhase474PwaAndPrint.mjs 2>&1 | tee phase474-critical-pwa-print.log
        env:
          APP_URL: http://127.0.0.1:4173
      - name: Upload focused evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-4-7-4-critical-evidence
          path: |
            phase474-audit/journeys
            phase474-audit/pwa-print
            phase474-critical-*.log
          if-no-files-found: warn
          retention-days: 7
