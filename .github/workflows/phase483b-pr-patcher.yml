name: Phase 4.8.3b Apply Tested Patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.head_ref == 'phase-4-8-3b-restore-garden-history'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-4-8-3b-restore-garden-history
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply Phase 4.8.3b
        run: python3 scripts/applyPhase483b.py
      - name: Install dependencies
        run: npm ci
      - name: Run complete test suite
        run: npm test
      - name: Build production app
        run: npm run build
      - name: Commit tested patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm -f .github/workflows/phase483b-apply.yml .github/workflows/phase483b-trigger.yml .github/workflows/phase483b-smoke.yml .github/workflows/phase483b-pr-patcher.yml scripts/applyPhase483b.py
          git add -A
          git commit -m "Restore Garden History entry on Garden"
          git push origin HEAD:phase-4-8-3b-restore-garden-history
