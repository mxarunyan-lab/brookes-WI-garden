services:
  - type: web
    name: brookes-wi-garden
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: APP_VERSION
        value: 0.20.4
      - key: SEED_PACKET_VISION_MODEL
        value: gpt-5-mini
      - key: SEED_PACKET_VISION_DETAIL
        value: auto
      - key: SEED_PACKET_VISION_REASONING_EFFORT
        value: minimal
      - key: SEED_PACKET_VISION_REPAIR_PASSES
        value: false
      - key: SEED_PACKET_VISION_MAX_IMAGE_BYTES
        value: 9437184
      - key: SEED_PACKET_VISION_TIMEOUT_MS
        value: 90000
      - key: OPENAI_API_KEY
        sync: false
