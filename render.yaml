services:
  - type: web
    name: brookes-wi-garden
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: APP_VERSION
        value: 0.20.3
      - key: SEED_PACKET_VISION_MODEL
        value: gpt-5-mini
      - key: SEED_PACKET_VISION_MAX_IMAGE_BYTES
        value: 9437184
      - key: OPENAI_API_KEY
        sync: false
